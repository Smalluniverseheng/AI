<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 多模型对话平台</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c5cfc">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c5cfc'/><text x='50' y='68' text-anchor='middle' font-size='50' fill='white'>🤖</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--s3:#242424;--b:#2a2a2a;--b2:#333;--t:#e8e8e8;--t2:#888;--t3:#555;--ac:#7c5cfc;--ac2:#a78bfa;--gr:#34d399;--rd:#f87171;--yl:#fbbf24;--bl:#60a5fa}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans CJK SC',sans-serif;background:var(--bg);color:var(--t);line-height:1.6}
.app{display:flex;height:100vh}

/* ===== Sidebar ===== */
.sb{width:320px;background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
.sb-hd{padding:14px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px}
.sb-hd h1{font-size:16px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-hd .ver{font-size:9px;color:var(--t3);background:var(--s3);padding:2px 5px;border-radius:3px}
.sb-tabs{display:flex;border-bottom:1px solid var(--b)}
.sb-tabs button{flex:1;padding:9px 0;background:none;border:none;color:var(--t2);cursor:pointer;font-size:12px;border-bottom:2px solid transparent;transition:.2s}
.sb-tabs button.on{color:var(--ac);border-bottom-color:var(--ac)}
.sb-body{flex:1;overflow-y:auto;padding:8px 10px}
.sb-body::-webkit-scrollbar{width:4px}.sb-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* Search */
.search-box{margin-bottom:8px}
.search-box input{width:100%;padding:7px 10px 7px 30px;background:var(--bg);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:12px;outline:none}
.search-box input:focus{border-color:var(--ac)}
.search-box{position:relative}
.search-box::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px}

/* Recent models */
.recent-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--b)}
.recent-item{font-size:11px;padding:3px 8px;background:var(--s3);border:1px solid var(--b);border-radius:5px;cursor:pointer;transition:.15s;white-space:nowrap}
.recent-item:hover{border-color:var(--ac);color:var(--ac)}

/* Provider tree */
.tree-pr{margin-bottom:2px}
.tree-pr-hd{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:.12s;user-select:none}
.tree-pr-hd:hover{background:var(--s2)}
.tree-pr-hd .arrow{font-size:9px;color:var(--t3);transition:.2s;width:12px;text-align:center}
.tree-pr-hd .arrow.open{transform:rotate(90deg)}
.tree-pr-hd .p-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.tree-pr-hd .p-name{font-size:12px;font-weight:600;flex:1}
.tree-pr-hd .p-count{font-size:10px;color:var(--t3);background:var(--s3);padding:1px 5px;border-radius:3px}
.tree-pr-hd .p-key-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tree-models{overflow:hidden;transition:max-height .25s ease;max-height:0}
.tree-models.open{max-height:2000px}
.tree-md{display:flex;align-items:center;gap:6px;padding:5px 8px 5px 38px;border-radius:5px;cursor:pointer;transition:.12s;font-size:12px}
.tree-md:hover{background:var(--s2)}
.tree-md.sel{background:rgba(124,92,252,.12);color:var(--ac2)}
.tree-md .md-name{flex:1}
.tree-md .md-tags{display:flex;gap:2px}
.tree-md .tag{font-size:9px;padding:1px 4px;border-radius:3px;background:var(--s3);color:var(--t2)}
.tree-md .tag.hot{background:rgba(124,92,252,.2);color:var(--ac2)}
.tree-md .tag.free{background:rgba(52,211,153,.15);color:var(--gr)}

/* API Keys */
.api-area{padding:2px}
.api-row{margin-bottom:8px}
.api-row .api-hd{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.api-row input[type=password],.api-row input[type=text]{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--b);border-radius:5px;color:var(--t);font-size:11px;outline:none;font-family:monospace}
.api-row input:focus{border-color:var(--ac)}
.api-row .ep-in{margin-top:2px}
.api-row .ep-in label{font-size:9px;color:var(--t3);display:block;margin-bottom:1px}
.api-row .key-status{font-size:11px;margin-left:4px}
.api-note{padding:8px;font-size:10px;color:var(--t3);line-height:1.5}

/* Stats */
.stat-card{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:10px;margin-bottom:8px}
.stat-card h3{font-size:12px;color:var(--ac2);margin-bottom:6px}
.stat-r{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.stat-r .l{color:var(--t2)}.stat-r .v{font-weight:600}
.stat-total{border-top:1px solid var(--b);margin-top:4px;padding-top:4px}
.stat-total .v{color:var(--yl);font-size:14px}

/* ===== Main ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.hd{padding:8px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mode-sw{display:flex;background:var(--s2);border-radius:7px;overflow:hidden;border:1px solid var(--b)}
.mode-sw button{padding:6px 12px;background:none;border:none;color:var(--t2);cursor:pointer;font-size:12px;transition:.2s;white-space:nowrap}
.mode-sw button.on{background:var(--ac);color:#fff}
.sel-mds{display:flex;gap:4px;flex-wrap:wrap;flex:1;min-width:0}
.sel-tag{background:var(--s2);border:1px solid var(--b);border-radius:5px;padding:2px 8px;font-size:11px;display:flex;align-items:center;gap:3px;white-space:nowrap}
.sel-tag .rm{cursor:pointer;color:var(--rd);font-weight:700;margin-left:1px}
.debate-cfg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);white-space:nowrap}
.debate-cfg input[type=range]{width:100px;accent-color:var(--ac)}
.debate-cfg input[type=number]{width:40px;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:2px 4px;border-radius:4px;font-size:11px;text-align:center}
.debate-cfg .preset-btn{padding:2px 6px;background:var(--s3);border:1px solid var(--b);border-radius:4px;color:var(--t2);cursor:pointer;font-size:10px}
.debate-cfg .preset-btn:hover{border-color:var(--ac);color:var(--ac)}
.hd-stats{font-size:10px;color:var(--t3);white-space:nowrap;cursor:pointer}
.hd-stats:hover{color:var(--ac)}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat::-webkit-scrollbar{width:5px}.chat::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.welcome{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--t2)}
.welcome h2{font-size:24px;color:var(--t)}.welcome p{font-size:13px;max-width:380px;text-align:center;line-height:1.7}

/* Messages */
.msg-g{display:flex;flex-direction:column;gap:5px}
.msg-g.user{align-items:flex-end}.msg-g.assistant{align-items:stretch}
.msg{max-width:88%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.7;word-break:break-word;position:relative}
.msg.user{background:linear-gradient(135deg,var(--ac),#6c4ce8);color:#fff;border-bottom-right-radius:4px}
.msg.ai{background:var(--s2);border:1px solid var(--b);border-bottom-left-radius:4px;max-width:100%}
.msg .ml{font-size:10px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.msg .ml .pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.msg .mm{font-size:10px;color:var(--t3);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.msg .mm .cost{color:var(--yl)}
.msg .mm button{background:none;border:none;color:var(--t2);cursor:pointer;font-size:10px;padding:1px 4px}
.msg .mm button:hover{color:var(--ac)}

/* Think */
.think-blk{margin-bottom:6px;border:1px solid var(--b);border-radius:8px;overflow:hidden}
.think-hd{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--s3);cursor:pointer;font-size:11px;color:var(--t2);user-select:none}
.think-hd .think-icon{animation:pulse 1.5s infinite}
.think-hd .think-label{flex:1}
.think-hd .think-arrow{font-size:9px;transition:.2s}
.think-hd .think-arrow.open{transform:rotate(90deg)}
.think-body{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:12px;color:var(--t2);line-height:1.6;padding:0 10px}
.think-body.open{max-height:5000px;padding:8px 10px;overflow-y:auto}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Thinking stream */
.thinking-stream{display:flex;align-items:center;gap:3px;color:var(--t2);font-size:12px;padding:8px 12px;background:var(--s2);border:1px solid var(--b);border-radius:10px}
.thinking-stream .dot{animation:blink 1.4s infinite}
.thinking-stream .dot:nth-child(2){animation-delay:.2s}
.thinking-stream .dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Multi grid */
.multi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:8px}
.multi-grid .msg{max-width:100%}

/* Debate */
.debate-badge{text-align:center;padding:4px}
.debate-badge span{background:linear-gradient(135deg,#f59e0b,#ef4444);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;color:#fff}
.debate-round{text-align:center;padding:3px}
.debate-round span{font-size:11px;color:var(--yl);background:rgba(251,191,36,.1);padding:3px 10px;border-radius:5px}
.debate-summary{background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:12px;margin-top:6px}

/* Attach */
.attach-area{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.attach-item{display:flex;align-items:center;gap:3px;background:var(--s3);border:1px solid var(--b);border-radius:5px;padding:3px 6px;font-size:10px}
.attach-item img{max-width:32px;max-height:32px;border-radius:3px}
.attach-item .att-rm{cursor:pointer;color:var(--rd);font-weight:700}

/* Input */
.inp-area{padding:10px 16px 12px;border-top:1px solid var(--b);background:var(--s1)}
.inp-row{display:flex;gap:6px;align-items:flex-end}
.inp-btns{display:flex;gap:3px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:8px;background:var(--s2);border:1px solid var(--b);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;flex-shrink:0}
.icon-btn:hover{border-color:var(--ac);color:var(--ac)}
.icon-btn.recording{background:rgba(248,113,113,.15);border-color:var(--rd);color:var(--rd);animation:pulse 1s infinite}
.send-btn{padding:9px 18px;background:var(--ac);border:none;border-radius:10px;color:#fff;font-size:13px;cursor:pointer;transition:.2s;white-space:nowrap;font-weight:600}
.send-btn:hover{background:var(--ac2)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.inp-hint{font-size:10px;color:var(--t3);margin-top:4px;text-align:center}
.inp-box{flex:1}
.inp-box textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--b);border-radius:10px;color:var(--t);font-size:13px;resize:none;outline:none;min-height:38px;max-height:140px;font-family:inherit;line-height:1.5;transition:border-color .2s}
.inp-box textarea:focus{border-color:var(--ac)}

/* ===== Markdown Content ===== */
.md-content h1{font-size:1.4em;font-weight:700;margin:.7em 0 .3em;padding-bottom:.2em;border-bottom:1px solid var(--b)}
.md-content h2{font-size:1.2em;font-weight:700;margin:.6em 0 .3em;padding-bottom:.2em;border-bottom:1px solid var(--b)}
.md-content h3{font-size:1.1em;font-weight:600;margin:.5em 0 .2em}
.md-content h4,.md-content h5,.md-content h6{font-size:1em;font-weight:600;margin:.4em 0 .2em}
.md-content p{margin:.3em 0}
.md-content ul,.md-content ol{margin:.3em 0;padding-left:1.3em}
.md-content li{margin:.15em 0}
.md-content blockquote{border-left:3px solid var(--ac);padding:6px 12px;margin:.5em 0;background:var(--s3);border-radius:0 6px 6px 0;color:var(--t2)}
.md-content code{background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px;font-size:.88em;font-family:'JetBrains Mono',Consolas,monospace}
.md-content pre{background:var(--bg);border:1px solid var(--b);border-radius:8px;margin:.5em 0;overflow:hidden;position:relative}
.md-content pre code{display:block;padding:12px;overflow-x:auto;background:none;font-size:.83em;line-height:1.6}
.md-content .code-hdr{display:flex;justify-content:space-between;align-items:center;padding:4px 12px;background:var(--s3);border-bottom:1px solid var(--b);font-size:10px;color:var(--t3)}
.md-content .code-hdr button{background:none;border:none;color:var(--t2);cursor:pointer;font-size:10px}.md-content .code-hdr button:hover{color:var(--ac)}
.md-content table{width:100%;border-collapse:collapse;margin:.5em 0;font-size:.88em;overflow-x:auto;display:block}
.md-content table thead{background:var(--s3)}
.md-content table th{padding:6px 10px;text-align:left;font-weight:600;border:1px solid var(--b);white-space:nowrap}
.md-content table td{padding:6px 10px;border:1px solid var(--b)}
.md-content table tbody tr:hover{background:rgba(124,92,252,.04)}
.md-content img{max-width:100%;border-radius:6px;margin:.3em 0}
.md-content a{color:var(--bl);text-decoration:none}.md-content a:hover{text-decoration:underline}
.md-content hr{border:none;border-top:1px solid var(--b);margin:.8em 0}
.md-content strong{font-weight:700}
.md-content .katex-display{margin:.5em 0;overflow-x:auto}

/* ===== Misc ===== */
.toast{position:fixed;top:14px;right:14px;padding:8px 16px;border-radius:7px;font-size:12px;z-index:999;animation:slideIn .3s;max-width:300px}
.toast.ok{background:var(--gr);color:#000}.toast.err{background:var(--rd);color:#fff}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}}
.offpeak-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(52,211,153,.15);color:var(--gr);animation:pulse 2s infinite}

@media(max-width:768px){.sb{display:none}.multi-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="sb">
    <div class="sb-hd"><h1>🤖 AI 多模型平台</h1><span class="ver">v3</span></div>
    <div class="sb-tabs">
      <button class="on" onclick="switchTab('models',this)">模型</button>
      <button onclick="switchTab('keys',this)">API Keys</button>
      <button onclick="switchTab('stats',this)">用量</button>
    </div>
    <div class="sb-body" id="sbBody"></div>
  </div>
  <div class="main">
    <div class="hd">
      <div class="mode-sw">
        <button class="on" onclick="setMode('single',this)">💬 单模型</button>
        <button onclick="setMode('multi',this)">📋 多模型</button>
        <button onclick="setMode('debate',this)">⚔️ 辩论</button>
      </div>
      <div class="sel-mds" id="selMds"></div>
      <div class="debate-cfg" id="debateCfg" style="display:none">
        <span>轮数:</span>
        <input type="range" id="dRange" min="1" max="99" value="3" oninput="S.debateRounds=+this.value;document.getElementById('dNum').value=this.value">
        <input type="number" id="dNum" min="1" max="99" value="3" onchange="S.debateRounds=+this.value;document.getElementById('dRange').value=this.value">
        <button class="preset-btn" onclick="setDR(3)">3</button>
        <button class="preset-btn" onclick="setDR(5)">5</button>
        <button class="preset-btn" onclick="setDR(10)">10</button>
        <button class="preset-btn" onclick="setDR(20)">20</button>
      </div>
      <div class="hd-stats" id="hdStats" onclick="switchTab('stats',document.querySelectorAll('.sb-tabs button')[2])"></div>
    </div>
    <div class="chat" id="chat">
      <div class="welcome">
        <h2>👋 欢迎使用</h2>
        <p>左侧选择厂商和模型，输入 API Key 即可开始对话。<br>支持单模型、多模型并行、模型辩论三种模式。<br>支持语音输入、文件上传、代码执行、Markdown 富文本。</p>
      </div>
    </div>
    <div class="inp-area">
      <div class="attach-area" id="attachArea"></div>
      <div class="inp-row">
        <div class="inp-btns">
          <button class="icon-btn" title="上传文件/图片" onclick="triggerFile()">📎</button>
          <button class="icon-btn" id="micBtn" title="语音输入" onclick="toggleVoice()">🎤</button>
        </div>
        <div class="inp-box">
          <textarea id="msgInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1" onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
      </div>
      <div class="inp-hint">Enter 发送 · Shift+Enter 换行 · 🎤 语音 · 🔊 播报 · ▶ 运行代码</div>
      <input type="file" id="fileInput" style="display:none" multiple accept="image/*,.pdf,.doc,.docx,.txt,.md,.csv,.json,.py,.js,.ts,.java,.c,.cpp,.go,.rs,.html,.css,.sql" onchange="onFiles(event)">
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>

<script>
// ==================== Providers ====================
const P={
openai:{name:'OpenAI',c:'#10a37f',i:'🟢',models:[
  {id:'gpt-4o',name:'GPT-4o',inp:2.5,out:10,ctx:128000,tags:['vision','file']},
  {id:'gpt-4o-mini',name:'GPT-4o Mini',inp:0.15,out:0.6,ctx:128000,tags:['vision','file','free']},
  {id:'gpt-4-turbo',name:'GPT-4 Turbo',inp:10,out:30,ctx:128000,tags:['vision','file']},
  {id:'o1',name:'o1',inp:15,out:60,ctx:200000,tags:['think','long']},
  {id:'o1-mini',name:'o1-mini',inp:3,out:12,ctx:128000,tags:['think']},
  {id:'o3-mini',name:'o3-mini',inp:1.1,out:4.4,ctx:200000,tags:['think','long']},
],ep:'https://api.openai.com/v1/chat/completions'},
anthropic:{name:'Anthropic',c:'#d97706',i:'🟠',models:[
  {id:'claude-sonnet-4-20250514',name:'Claude Sonnet 4',inp:3,out:15,ctx:200000,tags:['vision','file','long']},
  {id:'claude-3-5-haiku-20241022',name:'Claude 3.5 Haiku',inp:0.8,out:4,ctx:200000,tags:['vision','file','long','free']},
  {id:'claude-opus-4-20250514',name:'Claude Opus 4',inp:15,out:75,ctx:200000,tags:['vision','file','long','think']},
],ep:'https://api.anthropic.com/v1/messages'},
google:{name:'Google Gemini',c:'#4285f4',i:'🔵',models:[
  {id:'gemini-2.0-flash',name:'Gemini 2.0 Flash',inp:0.1,out:0.4,ctx:1048576,tags:['vision','file','long','free']},
  {id:'gemini-2.5-pro-preview-05-06',name:'Gemini 2.5 Pro',inp:1.25,out:10,ctx:1048576,tags:['vision','file','long','think']},
  {id:'gemini-1.5-pro',name:'Gemini 1.5 Pro',inp:1.25,out:5,ctx:2097152,tags:['vision','file','long']},
],ep:'https://generativelanguage.googleapis.com/v1beta'},
deepseek:{name:'DeepSeek',c:'#4f8cff',i:'🔷',models:[

let mediaRec=null,audioChunks=[],isRec=false;
async function toggleVoice(){
  if(isRec){if(mediaRec)mediaRec.stop();isRec=false;document.getElementById('micBtn').classList.remove('recording');return}
  // Try Web Speech API first
  if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const sr=new SR();sr.lang='zh-CN';sr.continuous=true;sr.interimResults=true;
    let final='';
    sr.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript}document.getElementById('msgInput').value=final;autoH(document.getElementById('msgInput'))};
    sr.onend=()=>{isRec=false;document.getElementById('micBtn').classList.remove('recording');toast('语音识别完成','ok')};
    sr.onerror=e=>{isRec=false;document.getElementById('micBtn').classList.remove('recording');if(e.error==='not-allowed')toast('麦克风权限被拒绝','err');else toast('语音识别错误: '+e.error,'err')};
    sr.start();isRec=true;document.getElementById('micBtn').classList.add('recording');toast('🎤 语音识别中...','ok');return;
  }
  // Fallback: MiMo ASR
  if(!S.mimoKey){toast('当前浏览器不支持语音识别，请配置 MiMo ASR Key','err');return}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
    audioChunks=[];
    mediaRec.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};
    mediaRec.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());await transcribe(new Blob(audioChunks,{type:'audio/webm'}))};
    mediaRec.start();isRec=true;document.getElementById('micBtn').classList.add('recording');toast('🎤 录音中 (MiMo ASR)...','ok');
  }catch(e){toast('麦克风访问失败','err')}
}
async function transcribe(blob){
  toast('正在识别...','ok');
  const fd=new FormData();fd.append('file',blob,'audio.webm');fd.append('model','mimo-v2.5-asr');fd.append('language','zh');
  try{
    const r=await fetch('https://api.mimo.mi.com/v1/audio/transcriptions',{headers:{'Authorization':`Bearer ${S.mimoKey}`},body:fd,method:'POST'});
    if(!r.ok)throw new Error(await r.text());
    const d=await r.json();const t=d.text||d.result||'';
    if(t){const inp=document.getElementById('msgInput');inp.value+=(inp.value?'\n':'')+t;autoH(inp);toast('✅ 识别完成','ok')}else toast('未识别到内容','err');
  }catch(e){toast('识别失败: '+e.message,'err')}
}

// ==================== TTS ====================
function speak(text){
  if(!('speechSynthesis' in window)){toast('浏览器不支持语音播报','err');return}
  speechSynthesis.cancel();
  const clean=text.replace(/[#*>\-\|]/g,'').replace(/`/g,'');
  const chunks=clean.split(/(?<=[。！？.!?\n])/g).filter(Boolean);
  let i=0;
  function next(){if(i>=chunks.length)return;const u=new SpeechSynthesisUtterance(chunks[i++]);u.lang='zh-CN';u.rate=1;u.onend=next;speechSynthesis.speak(u)}
  next();toast('🔊 播报中...','ok');
}

async function send(){
  const inp=document.getElementById('msgInput');const text=inp.value.trim();
  if(!text||S.streaming)return;
  if(!S.sel.length){toast('请先选择模型','err');return}
  for(const s of S.sel){if(!S.keys[s.pid]){toast(`请先输入 ${P[s.pid].name} 的 Key`,'err');return}}
  inp.value='';autoH(inp);
  const userMsg={role:'user',content:text,attachments:S.attachments.length?S.attachments.map(a=>({name:a.name,type:a.type,preview:a.preview,content:a.content})):undefined};
  S.attachments=[];renderAttach();
  S.msgs.push(userMsg);renderMsgs();scrollBtm();
  if(S.mode==='single')await streamSingle();
  else if(S.mode==='multi')await streamMulti();
  else await runDebate();
}

// ==================== API Call ====================
function buildMsgs(pid,mid){
  const p=P[pid],m=p.models.find(x=>x.id===mid);
  const canV=m.tags.includes('vision'),canF=m.tags.includes('file');
  const msgs=[];
  for(const msg of S.msgs){
    if(msg.role==='user'){
      const parts=[];
      if(msg.attachments?.length&&(canV||canF)){
        for(const a of msg.attachments){
          if(a.preview&&canV)parts.push({type:'image_url',image_url:{url:a.preview}});
          else if(a.content&&canF)parts.push({type:'text',text:`[文件: ${a.name}]\n${a.content}`});
        }
      }
      if(pid==='anthropic'){
        const c=[];
        for(const p2 of parts){if(p2.type==='image_url')c.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:p2.image_url.url.split(',')[1]}});else c.push({type:'text',text:p2.text})}
        c.push({type:'text',text:msg.content});msgs.push({role:'user',content:c});
      }else if(parts.length)msgs.push({role:'user',content:[...parts,{type:'text',text:msg.content}]});
      else msgs.push({role:'user',content:msg.content});
    }else if(msg.role==='assistant')msgs.push({role:'assistant',content:msg.content});
  }
  return msgs;
}

async function callAPI(pid,mid,msgs){
  const p=P[pid],m=p.models.find(x=>x.id===mid);const key=S.keys[pid],ep=S.eps[pid];
  let url,headers,body;
  if(pid==='anthropic'){url=ep?`${ep}/v1/messages`:p.ep;headers={'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'};const sys=msgs.find(x=>x.role==='system');const um=msgs.filter(x=>x.role!=='system');body={model:mid,max_tokens:8192,messages:um,stream:true};if(sys)body.system=sys.content;if(m.tags.includes('think'))body.thinking={type:'enabled',budget_tokens:4096}}
  else if(pid==='google'){const b=ep||p.ep;url=`${b}/models/${mid}:streamGenerateContent?key=${key}&alt=sse`;headers={'Content-Type':'application/json'};const c=[];for(const msg of msgs){if(msg.role==='system')continue;const pts=[];if(typeof msg.content==='string')pts.push({text:msg.content});else if(Array.isArray(msg.content))for(const c2 of msg.content){if(c2.type==='text')pts.push({text:c2.text});else if(c2.type==='image_url')pts.push({inlineData:{mimeType:'image/jpeg',data:c2.image_url.url.split(',')[1]}})}c.push({role:msg.role==='assistant'?'model':'user',parts:pts})}body={contents:c,generationConfig:{maxOutputTokens:8192}};const sys=msgs.find(x=>x.role==='system');if(sys)body.systemInstruction={parts:[{text:sys.content}]}}
  else if(pid==='baidu'){url=`${p.ep}/${mid}?access_token=${key}`;headers={'Content-Type':'application/json'};body={messages:msgs.filter(m2=>m2.role!=='system').map(m2=>({role:m2.role,content:typeof m2.content==='string'?m2.content:JSON.stringify(m2.content)})),stream:true};const sys=msgs.find(x=>x.role==='system');if(sys)body.system=sys.content}
  else{url=ep?`${ep.replace(/\/$/,'')}/v1/chat/completions`:p.ep;headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};body={model:mid,messages:msgs.map(m2=>({role:m2.role,content:typeof m2.content==='string'?m2.content:JSON.stringify(m2.content)})),stream:true}}
  const resp=await fetch(url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!resp.ok){const t=await resp.text();let msg;try{msg=JSON.parse(t).error?.message||JSON.parse(t).message||t}catch(e){msg=t};throw new Error(`${resp.status}: ${msg}`)}
  let content='',thinking='',inTok=0,outTok=0;const reader=resp.body.getReader(),dec=new TextDecoder();let buf='',thinkBuf='',isThinking=false;
  while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
    for(const line of lines){if(!line.startsWith('data:'))continue;const data=line.slice(line.indexOf(':')+1).trim();if(data==='[DONE]')continue;try{const json=JSON.parse(data);
      if(pid==='anthropic'){if(json.type==='content_block_start'){if(json.content_block?.type==='thinking')isThinking=true}else if(json.type==='content_block_delta'){if(isThinking&&json.delta?.thinking)thinkBuf+=json.delta.thinking;else if(json.delta?.text){if(isThinking){isThinking=false;thinking=thinkBuf}content+=json.delta.text}}else if(json.type==='message_start')inTok=json.message?.usage?.input_tokens||0;else if(json.type==='message_delta')outTok=json.usage?.output_tokens||0}
      else if(pid==='google'){const txt=json.candidates?.[0]?.content?.parts?.[0]?.text;if(txt)content+=txt;const u=json.usageMetadata;if(u){inTok=u.promptTokenCount||inTok;outTok=u.candidatesTokenCount||outTok}}
      else if(pid==='baidu'){content+=json.result||'';if(json.usage){inTok=json.usage.prompt_tokens||inTok;outTok=json.usage.completion_tokens||outTok}}
      else{const d=json.choices?.[0]?.delta;if(d?.reasoning_content||d?.thinking){thinkBuf+=d.reasoning_content||d.thinking;isThinking=true}else if(d?.content){if(isThinking){isThinking=false;thinking=thinkBuf}content+=d.content}if(json.usage){inTok=json.usage.prompt_tokens||inTok;outTok=json.usage.completion_tokens||outTok}}
    }catch(e){}}}
  if(isThinking&&thinkBuf)thinking=thinkBuf;
  if(!inTok&&!outTok){const tc=msgs.reduce((s,m2)=>s+(typeof m2.content==='string'?m2.content:JSON.stringify(m2.content)).length,0)+content.length;inTok=Math.ceil(tc*0.4);outTok=Math.ceil(content.length*0.4)}
  // Offpeak pricing for DeepSeek
  let inpPrice=m.inp,outPrice=m.out;
  if(pid==='deepseek'&&isOffpeak()){const op=p.offpeak;if(mid==='deepseek-chat'&&op.v3){inpPrice=op.v3.inp;outPrice=op.v3.out}else if(mid==='deepseek-reasoner'&&op.r1){inpPrice=op.r1.inp;outPrice=op.r1.out}}
  const cost=(inTok*inpPrice+outTok*outPrice)/1000000;
  return{content,thinking,tokens:inTok+outTok,cost};
}

// ==================== Streaming ====================
async function streamSingle(){
  const s=S.sel[0],p=P[s.pid],m=p.models.find(x=>x.id===s.mid);const key=`${p.name}/${m.name}`;
  S.streaming=true;document.getElementById('sendBtn').disabled=true;addThinking(key);
  try{const msgs=buildMsgs(s.pid,s.mid);const r=await callAPI(s.pid,s.mid,msgs);removeThinking();S.msgs.push({role:'assistant',content:r.content,key,tokens:r.tokens,cost:r.cost,thinking:r.thinking});addUsage(s.pid,s.mid,r.tokens,r.cost);renderMsgs();scrollBtm()}
  catch(e){removeThinking();toast('错误: '+e.message,'err');S.msgs.push({role:'assistant',content:`❌ ${e.message}`,key,tokens:0,cost:0});renderMsgs()}
  S.streaming=false;document.getElementById('sendBtn').disabled=false;
}

async function streamMulti(){
  S.streaming=true;document.getElementById('sendBtn').disabled=true;
  for(const s of S.sel){const p=P[s.pid],m=p.models.find(x=>x.id===s.mid);addThinking(`${p.name}/${m.name}`)}
  const proms=S.sel.map(async s=>{const p=P[s.pid],m=p.models.find(x=>x.id===s.mid);const key=`${p.name}/${m.name}`;try{const msgs=buildMsgs(s.pid,s.mid);const r=await callAPI(s.pid,s.mid,msgs);addUsage(s.pid,s.mid,r.tokens,r.cost);return{key,color:p.c,...r}}catch(e){return{key,color:p.c,content:`❌ ${e.message}`,tokens:0,cost:0}}});
  const res=await Promise.all(proms);removeThinking();S.msgs.push({role:'multi',responses:res});renderMsgs();scrollBtm();S.streaming=false;document.getElementById('sendBtn').disabled=false;
}

async function runDebate(){
  S.streaming=true;document.getElementById('sendBtn').disabled=true;
  const R=S.debateRounds,models=S.sel.slice(0,8);
  S.msgs.push({role:'debate-hd',text:`⚔️ 辩论 · ${models.length} 模型 · ${R} 轮`});renderMsgs();
  const allRounds=[];
  for(let r=0;r<R;r++){
    S.msgs.push({role:'debate-rd',round:r+1});renderMsgs();
    const roundResp=[];
    for(const s of models){
      const p=P[s.pid],m=p.models.find(x=>x.id===s.mid);const key=`${p.name}/${m.name}`;addThinking(`[R${r+1}] ${key}`);
      try{
        const sys=r===R-1?`你是 ${key}，最后一轮。总结核心观点，回应质疑，给出最终结论。`:`你是 ${key}，第${r+1}/${R}轮。陈述观点，指出他人不足，提出新论据。`;
        const apiMsgs=[{role:'system',content:sys}];
        if(r===0)apiMsgs.push({role:'user',content:`请就以下问题给出你的观点：\n\n${S.msgs[S.msgs.length-1-roundResp.length-1]?.content||''}`});
        else{let ctx=`原始问题：${S.msgs.find(m2=>m2.role==='user')?.content||''}\n\n`;for(const prev of allRounds)for(const resp of prev)ctx+=`**${resp.key}**（R${prev._round}）：${resp.content.substring(0,500)}\n\n`;ctx+=`请给出第${r+1}轮回应。`;apiMsgs.push({role:'user',content:ctx})}
        const result=await callAPI(s.pid,s.mid,apiMsgs);addUsage(s.pid,s.mid,result.tokens,result.cost);roundResp.push({key,color:p.c,...result});
      }catch(e){roundResp.push({key,color:p.c,content:`❌ ${e.message}`,tokens:0,cost:0})}
      removeThinking();
    }
    roundResp._round=r+1;allRounds.push(roundResp);
    S.msgs.push({role:'debate-resp',responses:roundResp,round:r+1});renderMsgs();scrollBtm();
  }
  // Summary
  if(R>=2){
    addThinking('📝 辩论总结');
    try{
      let summaryCtx=`以下是${models.length}个AI模型经过${R}轮辩论的内容，请作为中立裁判总结各方观点优劣，给出综合结论：\n\n`;
      for(const rd of allRounds)for(const resp of rd)summaryCtx+=`**${resp.key}**：${resp.content.substring(0,800)}\n\n`;
      const summaryMsgs=[{role:'system',content:'你是中立裁判，总结辩论各方观点，分析优劣，给出综合结论。'},{role:'user',content:summaryCtx}];
      const sumResult=await callAPI(models[0].pid,models[0].mid,summaryMsgs);removeThinking();
      S.msgs.push({role:'debate-summary',content:sumResult.content,key:'📝 辩论总结'});renderMsgs();scrollBtm();
    }catch(e){removeThinking()}
  }
  S.msgs.push({role:'debate-end'});renderMsgs();S.streaming=false;document.getElementById('sendBtn').disabled=false;
}

function addUsage(pid,mid,tok,cost){const p=P[pid],m=p.models.find(x=>x.id===mid);const key=`${p.name}/${m.name}`;S.totalTok+=tok;S.totalCost+=cost;if(!S.modelUsage[key])S.modelUsage[key]={tokens:0,cost:0,calls:0};S.modelUsage[key].tokens+=tok;S.modelUsage[key].cost+=cost;S.modelUsage[key].calls+=1;localStorage.setItem('aiu',JSON.stringify({t:S.totalTok,c:S.totalCost,m:S.modelUsage}));updHdStats()}

// ==================== Rendering ====================
function renderMsgs(){
  const el=document.getElementById('chat');let h='';
  // Offpeak badge
  if(isOffpeak())h+=`<div style="text-align:center"><span class="offpeak-badge">🌿 DeepSeek 错峰时段 (00:30-08:30) · V3五折 · R1二五折</span></div>`;
  for(const msg of S.msgs){
    if(msg.role==='user'){let ah='';if(msg.attachments?.length){ah='<div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">';for(const a of msg.attachments){if(a.preview)ah+=`<img src="${a.preview}" style="max-width:60px;max-height:60px;border-radius:4px">`;else ah+=`<span style="font-size:10px;background:rgba(255,255,255,.15);padding:1px 5px;border-radius:3px">📄 ${a.name}</span>`}ah+='</div>'}h+=`<div class="msg-g user"><div class="msg user">${esc(msg.content)}${ah}</div></div>`}
    else if(msg.role==='assistant'){h+=`<div class="msg-g assistant"><div class="msg ai">${thinkBlk(msg.thinking)}<div class="ml"><span class="pdot" style="background:${keyColor(msg.key)}"></span>${msg.key}</div><div class="md-content">${renderMD(msg.content)}</div><div class="mm"><span>📝 ${fmtN(msg.tokens)} tok</span><span class="cost">💰 $${msg.cost.toFixed(4)}</span><button onclick="speak(this.closest('.msg').querySelector('.md-content').textContent)">🔊</button><button onclick="copyTxt(this.closest('.msg').querySelector('.md-content').textContent)">📋</button></div></div></div>`}
    else if(msg.role==='multi'){h+=`<div class="msg-g assistant"><div class="multi-grid">`;for(const r of msg.responses){h+=`<div class="msg ai" style="border-left:3px solid ${r.color}">${thinkBlk(r.thinking)}<div class="ml"><span class="pdot" style="background:${r.color}"></span>${r.key}</div><div class="md-content">${renderMD(r.content)}</div><div class="mm"><span>📝 ${fmtN(r.tokens)}</span><span class="cost">💰 $${r.cost.toFixed(4)}</span><button onclick="speak(this.closest('.msg').querySelector('.md-content').textContent)">🔊</button></div></div>`}h+='</div></div>'}
    else if(msg.role==='debate-hd')h+=`<div class="debate-badge"><span>${msg.text}</span></div>`;
    else if(msg.role==='debate-rd')h+=`<div class="debate-round"><span>📌 第 ${msg.round} 轮</span></div>`;
    else if(msg.role==='debate-resp'){h+=`<div class="msg-g assistant"><div class="multi-grid">`;for(const r of msg.responses){h+=`<div class="msg ai" style="border-left:3px solid ${r.color}">${thinkBlk(r.thinking)}<div class="ml"><span class="pdot" style="background:${r.color}"></span>${r.key}</div><div class="md-content">${renderMD(r.content)}</div><div class="mm"><span>📝 ${fmtN(r.tokens)}</span><span class="cost">💰 $${msg.cost?.toFixed(4)||'0'}</span></div></div>`}h+='</div></div>'}
    else if(msg.role==='debate-summary')h+=`<div class="msg-g assistant"><div class="msg ai debate-summary"><div class="ml"><span class="pdot" style="background:var(--yl)"></span>${msg.key}</div><div class="md-content">${renderMD(msg.content)}</div></div></div>`;
    else if(msg.role==='debate-end')h+=`<div class="debate-badge"><span>✅ 辩论结束</span></div>`;
  }
  el.innerHTML=h;renderMermaid();addCopyBtns();
}

function thinkBlk(t){if(!t)return'';const id='t_'+Math.random().toString(36).slice(2,7);return`<div class="think-blk"><div class="think-hd" onclick="document.getElementById('${id}b').classList.toggle('open');document.getElementById('${id}a').classList.toggle('open')"><span class="think-icon">🧠</span><span class="think-label">思考过程</span><span class="think-arrow" id="${id}a">▶</span></div><div class="think-body" id="${id}b">${renderMD(t)}</div></div>`}

function addThinking(label){const el=document.getElementById('chat');const d=document.createElement('div');d.className='thinking-stream';d.id='th_'+Date.now();d.innerHTML=`<span>🧠 ${label}</span><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;el.appendChild(d);scrollBtm()}
function removeThinking(){document.querySelectorAll('[id^="th_"]').forEach(e=>e.remove())}

// ==================== Markdown ====================
function renderMD(text){
  if(!text)return'';let t=text;
  t=t.replace(/```mermaid\n([\s\S]*?)```/g,(m,c)=>`<div class="mermaid-block" data-code="${btoa(unescape(encodeURIComponent(c)))}"></div>`);
  t=t.replace(/\$\$\n?([\s\S]*?)\n?\$\$/g,(m,c)=>{try{return katex.renderToString(c.trim(),{displayMode:true,throwOnError:false})}catch(e){return`<pre>${c}</pre>`}});
  t=t.replace(/\$([^\$\n]+?)\$/g,(m,c)=>{try{return katex.renderToString(c.trim(),{displayMode:false,throwOnError:false})}catch(e){return m}});
  let html=marked.parse(t);
  // Add run button for python code blocks
  html=html.replace(/<pre><code class="language-python">([\s\S]*?)<\/code><\/pre>/g,(m,code)=>{
    const id='py_'+Math.random().toString(36).slice(2,7);return`<div class="code-hdr"><span>Python</span><button onclick="runPy('${id}')">▶ 运行</button></div><pre><code id="${id}" class="language-python">${code}</code></pre><div id="${id}_out" style="display:none;background:var(--s3);border:1px solid var(--b);border-radius:0 0 8px 8px;padding:10px;font-size:12px;max-height:300px;overflow:auto"></div>`;
  });
  return html;
}
function renderMermaid(){document.querySelectorAll('.mermaid-block').forEach(el=>{const code=decodeURIComponent(escape(atob(el.dataset.code)));const id='m_'+Math.random().toString(36).slice(2,7);try{mermaid.render(id,code).then(({svg})=>{el.innerHTML=svg}).catch(e=>{el.innerHTML=`<pre>${code}</pre>`})}catch(e){el.innerHTML=`<pre>${code}</pre>`}})}
function addCopyBtns(){document.querySelectorAll('.md-content pre:not(.has-btn)').forEach(pre=>{pre.classList.add('has-btn')})}
function keyColor(key){for(const p of Object.values(P)){if(key.startsWith(p.name))return p.c}return'var(--ac)'}
function copyTxt(t){navigator.clipboard.writeText(t).then(()=>toast('已复制','ok')).catch(()=>{})}

// ==================== Python Execution (simplified) ====================
async function runPy(id){
  const code=document.getElementById(id)?.textContent;if(!code)return;
  const out=document.getElementById(id+'_out');if(!out)return;
  out.style.display='block';out.innerHTML='<span style="color:var(--t2)">⏳ 正在加载 Python 运行时...</span>';
  try{
    if(!window._pyodide){window._pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/'})}
    const py=window._pyodide;
    // Capture stdout
    py.runPython('import sys,io;_stdout=io.StringIO();sys.stdout=_stdout');
    py.runPython(code);
    const output=py.runPython('_stdout.getvalue()');
    out.innerHTML=`<pre style="margin:0;white-space:pre-wrap;color:var(--t)">${esc(output)}</pre>`;
  }catch(e){out.innerHTML=`<pre style="margin:0;color:var(--rd)">${esc(e.message)}</pre>`}
}

renderSB();renderSel();updHdStats();updateHint();
if(!S._treeOpen)S._treeOpen={};S._treeOpen.openai=true;renderSB();

// Register PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
