<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第三方科技 - AI Chat</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAFA;--bg-card:#FFFFFF;--bg-msg-ai:#F3F4F6;--text:#1F2937;--text-secondary:#6B7280;--text-muted:#9CA3AF;
  --border:#E5E7EB;--accent:#3B82F6;--accent-dark:#2563EB;--accent-light:#60A5FA;
  --user-gradient:linear-gradient(135deg,#3B82F6,#2563EB);
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --nav-h:56px;
  --transition:all 0.3s ease;
}
[data-theme="dark"]{
  --bg:#111827;--bg-card:#1F2937;--bg-msg-ai:#374151;--text:#F9FAFB;--text-secondary:#D1D5DB;--text-muted:#9CA3AF;
  --border:#374151;--shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.4);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);transition:var(--transition)}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit}
input,textarea,select{font-family:inherit;outline:none}

/* ========== LOGIN PAGE ========== */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-card{background:var(--bg-card);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);text-align:center}
.login-logo{width:64px;height:64px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:700;margin:0 auto 20px}
.login-title{font-size:24px;font-weight:700;margin-bottom:8px}
.login-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:32px}
.login-form{text-align:left}
.login-field{margin-bottom:20px}
.login-field label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.login-field input{width:100%;padding:12px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;transition:border-color 0.2s}
.login-field input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:14px;border-radius:var(--radius-sm);background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;font-size:15px;font-weight:600;transition:transform 0.2s,box-shadow 0.2s}
.login-btn:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(59,130,246,0.4)}
.login-btn:active{transform:scale(0.98)}
.login-error{color:#EF4444;font-size:13px;margin-top:12px;display:none}
.login-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg);border-radius:var(--radius-sm);padding:4px}
.login-tab{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text-secondary);background:transparent;transition:var(--transition)}
.login-tab.active{background:var(--bg-card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1)}

/* ========== REGISTER FORM ========== */
.register-extra{display:none}
.register-extra.show{display:block}
.tag-select-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.tag-option{padding:12px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);text-align:center;cursor:pointer;transition:var(--transition);font-size:13px}
.tag-option:hover{border-color:var(--accent);background:rgba(59,130,246,0.05)}
.tag-option.selected{border-color:var(--accent);background:rgba(59,130,246,0.1);color:var(--accent)}
.tag-option .tag-icon{font-size:24px;display:block;margin-bottom:4px}

/* ========== APP LAYOUT ========== */
.app{display:none;height:100vh;flex-direction:column}
.app.show{display:flex}

/* Top Nav */
.nav{height:var(--nav-h);background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:fixed;top:0;left:0;right:0;z-index:50;transition:var(--transition)}
.nav-brand{font-size:17px;font-weight:700;color:var(--text);margin-right:auto;display:flex;align-items:center;gap:8px}
.nav-brand .logo-sm{width:28px;height:28px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700}
.nav-btn{width:36px;height:36px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;transition:var(--transition);color:var(--text-secondary)}
.nav-btn:hover{background:var(--border);transform:scale(1.05)}
.model-select-wrap{position:relative}
.model-select-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);font-size:13px;color:var(--text);cursor:pointer;transition:var(--transition);max-width:200px}
.model-select-btn:hover{border-color:var(--accent)}
.model-select-btn .dot{width:8px;height:8px;border-radius:50%;background:#22C55E;flex-shrink:0}
.model-select-btn .arrow{font-size:10px;color:var(--text-muted);margin-left:4px}
.model-dropdown{position:absolute;top:calc(100% + 6px);right:0;width:280px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:100;display:none;max-height:360px;overflow:hidden;flex-direction:column}
.model-dropdown.show{display:flex}
.model-dropdown .dd-search{padding:10px;border-bottom:1px solid var(--border)}
.model-dropdown .dd-search input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.model-dropdown .dd-list{overflow-y:auto;flex:1;padding:6px}
.model-dd-item{padding:8px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;transition:var(--transition)}
.model-dd-item:hover{background:var(--bg)}
.model-dd-item.active{background:rgba(59,130,246,0.1);color:var(--accent)}
.model-dd-item .mi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Main Content */
.main-content{flex:1;margin-top:var(--nav-h);display:flex;flex-direction:column;overflow:hidden}
.chat-container{flex:1;overflow-y:auto;padding:20px 16px 100px}
.chat-inner{max-width:720px;margin:0 auto}

/* Welcome */
.welcome{text-align:center;padding:80px 20px}
.welcome .logo-big{width:72px;height:72px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;font-weight:700;margin:0 auto 20px}
.welcome h2{font-size:22px;font-weight:700;margin-bottom:8px}
.welcome p{font-size:14px;color:var(--text-secondary);max-width:400px;margin:0 auto 24px;line-height:1.6}

/* Messages */
.msg{display:flex;gap:10px;margin-bottom:20px;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;color:#fff}
.msg-user .msg-avatar{background:linear-gradient(135deg,#3B82F6,#2563EB)}
.msg-ai .msg-avatar{background:linear-gradient(135deg,#8B5CF6,#6366F1)}
.msg-body{max-width:85%;min-width:60px}
.msg-meta{font-size:11px;color:var(--text-muted);margin-bottom:4px;padding:0 4px}
.msg-user .msg-meta{text-align:right}
.msg-bubble{padding:12px 16px;font-size:14px;line-height:1.7;word-break:break-word}
.msg-user .msg-bubble{background:var(--user-gradient);color:#fff;border-radius:16px 16px 4px 16px}
.msg-ai .msg-bubble{background:var(--bg-msg-ai);color:var(--text);border-radius:16px 16px 16px 4px}
.msg-bubble p{margin-bottom:8px}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble pre{background:rgba(0,0,0,0.06);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto;position:relative;font-size:13px}
[data-theme="dark"] .msg-bubble pre{background:rgba(0,0,0,0.3)}
.msg-bubble code{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px}
.msg-bubble :not(pre)>code{background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px}
[data-theme="dark"] .msg-bubble :not(pre)>code{background:rgba(255,255,255,0.1)}
.msg-bubble blockquote{border-left:3px solid var(--accent);padding:8px 12px;margin:8px 0;background:rgba(59,130,246,0.05);border-radius:0 8px 8px 0}
.msg-bubble table{border-collapse:collapse;width:100%;margin:8px 0}
.msg-bubble th,.msg-bubble td{border:1px solid var(--border);padding:6px 10px;text-align:left;font-size:13px}
.msg-bubble th{background:var(--bg);font-weight:600}
.msg-bubble ul,.msg-bubble ol{padding-left:18px;margin:6px 0}
.msg-bubble li{margin-bottom:3px}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{margin:12px 0 6px;font-weight:600}
.msg-bubble h1{font-size:18px}
.msg-bubble h2{font-size:16px}
.msg-bubble h3{font-size:15px}

/* Thinking */
.thinking-block{margin:8px 0;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.thinking-header{padding:8px 12px;font-size:12px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:6px;background:var(--bg);user-select:none}
.thinking-header:hover{background:var(--border)}
.thinking-header .arrow{transition:transform 0.2s;font-size:10px}
.thinking-header .arrow.open{transform:rotate(90deg)}
.thinking-content{padding:10px 12px;font-size:13px;color:var(--text-secondary);line-height:1.6;display:none;background:var(--bg)}
.thinking-content.show{display:block}

/* Copy btn */
.copy-btn{position:absolute;top:6px;right:6px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-size:11px;cursor:pointer;opacity:0;transition:opacity 0.2s}
pre:hover .copy-btn{opacity:1}

/* Rainbow thinking */
@keyframes rainbow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.thinking-indicator{display:inline-flex;align-items:center;gap:8px;padding:8px 0;font-size:14px;font-weight:500;background:linear-gradient(90deg,#EF4444,#EAB308,#22C55E,#3B82F6,#A855F7,#EF4444);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:rainbow 3s ease infinite}

/* Input Area - WeChat Style */
.input-area{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);z-index:40}
.input-bar{max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:6px;padding:8px 12px}
.input-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.input-right{display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative}
.input-toggle{width:36px;height:36px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:var(--transition);color:var(--text-secondary)}
.input-toggle:hover{background:var(--border)}
.input-wrap{flex:1;min-height:36px;display:flex;align-items:center}
.input-wrap textarea{width:100%;min-height:36px;max-height:120px;padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;line-height:1.4;resize:none;outline:none;transition:border-color 0.2s;font-family:inherit}
.input-wrap textarea:focus{border-color:var(--accent)}
.input-wrap textarea::placeholder{color:var(--text-muted)}
.voice-btn{width:100%;min-height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text-secondary);font-size:14px;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:none}
.voice-btn:active,.voice-btn.recording{background:rgba(59,130,246,0.1);border-color:var(--accent);color:var(--accent)}
.voice-btn.recording{animation:voicePulse 1s ease infinite}
@keyframes voicePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.plus-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:transform 0.2s;flex-shrink:0}
.plus-btn:hover{transform:scale(1.1)}
.plus-btn:active{transform:scale(0.95)}
.send-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;display:flex;align-items:center;justify-content:center;transition:transform 0.2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.1)}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{opacity:0.4;transform:none}
.send-btn svg{width:18px;height:18px}
.plus-menu{position:absolute;bottom:calc(100% + 8px);right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:16px;display:none;z-index:50}
.plus-menu.show{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.plus-menu-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:var(--transition);text-align:center}
.plus-menu-item:hover{background:var(--bg)}
.plus-menu-item .pm-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.plus-menu-item .pm-label{font-size:11px;color:var(--text-secondary)}
.model-tag{font-size:11px;color:var(--text-muted);text-align:center;padding:4px 0}
.voice-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.voice-overlay.show{display:flex}
.voice-overlay .vo-circle{width:120px;height:120px;border-radius:50%;background:rgba(59,130,246,0.2);display:flex;align-items:center;justify-content:center;animation:voiceRing 1.5s ease infinite}
@keyframes voiceRing{0%{box-shadow:0 0 0 0 rgba(59,130,246,0.4)}70%{box-shadow:0 0 0 20px rgba(59,130,246,0)}100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}}
.voice-overlay .vo-mic{font-size:48px}
.voice-overlay .vo-text{color:#fff;font-size:16px;font-weight:500}
.voice-overlay .vo-hint{color:rgba(255,255,255,0.6);font-size:13px}
.voice-overlay .vo-cancel{margin-top:20px;padding:10px 24px;border-radius:20px;background:rgba(255,255,255,0.2);color:#fff;border:none;font-size:14px;cursor:pointer}
@media(max-width:768px){.input-bar{padding:6px 10px}.plus-menu{right:-10px}}

/* Settings Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-radius:20px;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-muted);transition:var(--transition)}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{flex:1;overflow-y:auto;padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;transition:var(--transition)}
.btn:hover{transform:scale(1.02)}
.btn:active{transform:scale(0.98)}
.btn-ghost{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-primary{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff}
.btn-danger{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA}
.btn-danger:hover{background:#FCA5A5;color:#fff}
[data-theme="dark"] .btn-danger{background:rgba(220,38,38,0.2);border-color:rgba(220,38,38,0.3)}

/* Model List in Settings */
.model-list-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;transition:var(--transition)}
.model-list-item:hover{border-color:var(--accent);background:rgba(59,130,246,0.03)}
.model-list-item .mi-info{flex:1;min-width:0}
.model-list-item .mi-name{font-size:14px;font-weight:600}
.model-list-item .mi-url{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.model-list-item .mi-actions{display:flex;gap:4px}
.model-list-item .mi-actions button{width:28px;height:28px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted);transition:var(--transition)}
.model-list-item .mi-actions button:hover{color:var(--text);background:var(--border)}
.model-list-item .mi-actions button.del:hover{color:#DC2626;background:#FEE2E2}

/* Add Model Form */
.add-model-form{background:var(--bg);border-radius:var(--radius-sm);padding:16px;margin-top:12px;border:1px solid var(--border)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.form-row input,.form-row select{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);font-size:13px;transition:border-color 0.2s}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.form-row .input-group{position:relative}
.form-row .input-group input{padding-right:36px}
.toggle-pw{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:4px;background:transparent;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.form-row-inline{display:flex;gap:8px}
.form-row-inline .form-row{flex:1}

/* Section headers in settings */
.section-title{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin:20px 0 10px;display:flex;align-items:center;gap:6px}
.section-title:first-child{margin-top:0}

/* Password eye icon */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-size:13px;z-index:300;box-shadow:var(--shadow);opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{border-color:#22C55E;color:#22C55E}
.toast.error{border-color:#EF4444;color:#EF4444}

/* Responsive */
@media(max-width:768px){
  .nav{padding:0 12px}
  .chat-container{padding:12px 10px 90px}
  .input-area{padding:10px 12px 14px}
  .login-card{padding:32px 24px}
  .model-select-btn{max-width:140px}
  .model-dropdown{right:-40px;width:260px}
  .tag-select-grid{grid-template-columns:repeat(2,1fr)}
}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Typing dots */
.typing-dots{display:inline-flex;gap:4px;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:dotBounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}

/* Admin badge */
.admin-badge{display:inline-block;padding:2px 8px;border-radius:4px;background:linear-gradient(135deg,#8B5CF6,#6366F1);color:#fff;font-size:10px;font-weight:600;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">三</div>
    <h1 class="login-title">第三方科技</h1>
    <p class="login-subtitle">多模型智能对话平台</p>

    <div class="login-tabs">
      <button class="login-tab active" onclick="switchTab('login')">登录</button>

// ========== INIT ==========
function init(){
  loadState();
  if(!state.users.length){
    // Create default admin
    state.users.push({username:'1234',password:'1234',role:'admin',tag:'管理员',name:'管理员',createdAt:Date.now()});
    saveState();
  }
  if(!state.models.length){
    state.models = JSON.parse(JSON.stringify(DEFAULT_MODELS));
    saveState();
  }
  // Force-update MiMo API key every time (overwrite stale localStorage)
  state.models.forEach(m=>{
    if(m.provider==='小米'){
      m.apiKey='sk-c1m9z3z4w5hu6rqw31ngrmt5yssga636vkjjb8ktedxlepjl';
      m.baseUrl='https://api.xiaomimimo.com';
      m.path='/v1/chat/completions';
    }
  });
  // Check login
  const savedUser = localStorage.getItem('ai-chat-user');
  if(savedUser){
    const u = JSON.parse(savedUser);
    const found = state.users.find(x=>x.username===u.username);
    if(found){
      state.currentUser = found;
      showApp();
      return;
    }
  }
  showLogin();
}

function loadState(){
  try{
    const s=localStorage.getItem('ai-chat-state');
    if(s){
      const parsed=JSON.parse(s);
      // Version check: force model refresh if version mismatch
      if(parsed._v!==APP_VERSION){
        // Keep users and conversations, but reset models
        state.users=parsed.users||state.users;
        state.conversations=parsed.conversations||[];
        state.theme=parsed.theme||'light';
        // Don't load models - will be re-initialized
      }else{
        state={...state,...parsed};
      }
    }
  }catch(e){}
}
function saveState(){
  try{localStorage.setItem('ai-chat-state',JSON.stringify({_v:APP_VERSION,
    users:state.users,models:state.models,conversations:state.conversations,
    selectedModel:state.selectedModel,theme:state.theme
  }));}catch(e){}
}

// ========== LOGIN ==========
function showLogin(){
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('mainApp').classList.remove('show');
}
function showApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainApp').classList.add('show');
  applyTheme();
  renderModelDD();
  updateModelDisplay();
  renderConversations();
  if(!state.currentConv) showWelcome(true);
  document.getElementById('userInput').focus();
}

function switchTab(tab){
  document.querySelectorAll('.login-tab').forEach((t,i)=>{
    t.classList.toggle('active',tab==='login'?!i:i);
  });
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
  document.getElementById('loginError').style.display='none';
  document.getElementById('regError').style.display='none';
}

let selectedRegTag='';
function selectRegTag(el){
  document.querySelectorAll('.tag-option').forEach(t=>t.classList.remove('selected'));
  el.classList.add('selected');
  selectedRegTag=el.dataset.tag;
}

function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  if(!u||!p){err.textContent='请输入用户名和密码';err.style.display='block';return;}
  const found=state.users.find(x=>x.username===u&&x.password===p);
  if(!found){err.textContent='用户名或密码错误';err.style.display='block';return;}
  state.currentUser=found;
  localStorage.setItem('ai-chat-user',JSON.stringify({username:found.username}));
  showApp();
}

function doRegister(){
  const err=document.getElementById('regError');
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const phone=document.getElementById('regPhone').value.trim();
  const pass=document.getElementById('regPass').value;
  const pass2=document.getElementById('regPass2').value;
  const remark=document.getElementById('regRemark').value.trim();

  if(!selectedRegTag){err.textContent='请选择你的身份';err.style.display='block';return;}
  if(!name){err.textContent='请输入真实姓名';err.style.display='block';return;}
  if(!email){err.textContent='请输入邮箱';err.style.display='block';return;}
  if(!phone){err.textContent='请输入手机号';err.style.display='block';return;}
  if(pass.length<8){err.textContent='密码至少8位';err.style.display='block';return;}
  if(pass!==pass2){err.textContent='两次密码不一致';err.style.display='block';return;}

  // Check duplicate
  if(state.users.find(x=>x.username===email)){err.textContent='该邮箱已注册';err.style.display='block';return;}

  // Add as pending user (auto-approved for now)
  const newUser={username:email,password:pass,role:'user',tag:selectedRegTag,name,email,phone,remark,createdAt:Date.now()};
  state.users.push(newUser);
  saveState();

  err.style.display='none';
  showToast('注册成功！请登录','success');
  switchTab('login');
  document.getElementById('loginUser').value=email;
}

function doLogout(){
  state.currentUser=null;
  localStorage.removeItem('ai-chat-user');
  showLogin();
}

function togglePw(id,btn){
  const inp=document.getElementById(id);
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁';}
}

// ========== THEME ==========
function toggleTheme(){
  state.theme=state.theme==='light'?'dark':'light';
  applyTheme();
  saveState();
}
function applyTheme(){
  document.documentElement.setAttribute('data-theme',state.theme);
  document.getElementById('themeBtn').textContent=state.theme==='light'?'☀️':'🌙';
}

// ========== MODEL SELECTOR ==========
function toggleModelDD(){
  document.getElementById('modelDropdown').classList.toggle('show');
  if(document.getElementById('modelDropdown').classList.contains('show')){
    renderModelDD();
  }
}
function renderModelDD(){
  const list=document.getElementById('modelDDList');
  const q=(list.previousElementSibling.querySelector('input').value||'').toLowerCase();
  list.innerHTML=state.models.filter(m=>{
    if(!q)return true;
    return (m.name+m.provider+m.modelId).toLowerCase().includes(q);
  }).map(m=>`
    <div class="model-dd-item ${state.selectedModel===m.id?'active':''}" onclick="selectModel('${m.id}')">
      <span class="mi-dot" style="background:${m.color||'#999'}"></span>
      <span>${m.name}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--text-muted)">${m.provider}</span>
    </div>
  `).join('');
}
function filterModelDD(q){
  renderModelDD();
}
function selectModel(id){
  state.selectedModel=id;
  saveState();
  updateModelDisplay();
  document.getElementById('modelDropdown').classList.remove('show');
}
function updateModelDisplay(){
  const m=state.models.find(x=>x.id===state.selectedModel)||state.models[0];
  if(!m)return;
  state.selectedModel=m.id;
  document.getElementById('currentModelName').textContent=m.name;
  document.getElementById('modelTag').textContent=`${m.name} · ${m.provider}`;
}

// Close dropdown on outside click
document.addEventListener('click',e=>{
  const dd=document.getElementById('modelDropdown');
  const btn=document.getElementById('modelSelectBtn');
  if(dd&&!dd.contains(e.target)&&!btn.contains(e.target))dd.classList.remove('show');
});

// ========== CONVERSATIONS ==========
function getConv(){return state.conversations.find(c=>c.id===state.currentConv);}
function renderConversations(){/* sidebar not implemented in this version */}

function newConversation(){
  const conv={id:Date.now().toString(),title:'新对话',messages:[],createdAt:Date.now()};
  state.conversations.unshift(conv);
  state.currentConv=conv.id;
  saveState();
  showWelcome(true);
}

function showWelcome(show){
  const w=document.getElementById('welcomeScreen');
  if(w)w.style.display=show?'block':'none';
}

// ========== MESSAGES ==========
function sendMessage(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text||state.streaming)return;

  if(!state.currentConv) newConversation();
  const conv=getConv();
  if(!conv)return;

  showWelcome(false);

  conv.messages.push({role:'user',content:text,timestamp:Date.now()});
  if(conv.messages.length===1) conv.title=text.slice(0,40)+(text.length>40?'...':'');
  renderMessages(conv.messages);
  input.value='';
  input.style.height='auto';
  updateSendBtn();

  callAI(conv,text);
  saveState();
}

async function callAI(conv,text){
  const m=state.models.find(x=>x.id===state.selectedModel)||state.models[0];
  if(!m||!m.apiKey){showToast('请先在设置中配置 API Key','error');openSettings();return;}

  const aiMsg={role:'assistant',content:'',thinking:'',model:m.name,provider:m.provider,timestamp:Date.now()};
  conv.messages.push(aiMsg);
  renderMessages(conv.messages);
  state.streaming=true;
  updateSendBtn();

  const endpoint=m.baseUrl+m.path;

  try{
    const headers={'Content-Type':'application/json'};
    let body;

    if(m.format==='anthropic'){
      headers['x-api-key']=m.apiKey;
      headers['anthropic-version']='2023-06-01';
      body={model:m.modelId,max_tokens:4096,messages:conv.messages.filter(x=>x.role==='user'||(x.role==='assistant'&&x.content)).map(x=>({role:x.role,content:x.content}))};
    }else{
      headers['api-key']=m.apiKey;
      body={model:m.modelId,max_tokens:4096,messages:conv.messages.filter(x=>x.role==='user'||(x.role==='assistant'&&x.content)).map(x=>({role:x.role,content:x.content}))};
    }

    const resp=await fetch(endpoint,{method:'POST',headers,body:JSON.stringify(body)});
    if(!resp.ok){const errText=await resp.text();throw new Error('API '+resp.status+': '+errText.slice(0,200));}

    const data=await resp.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));

    let content='',thinking='';
    if(m.format==='anthropic'){
      content=data.content?.[0]?.text||'';
    }else{
      const choice=data.choices?.[0];
      thinking=choice?.message?.reasoning_content||'';
      content=choice?.message?.content||'';
    }
    aiMsg.content=content;
    aiMsg.thinking=thinking;
    updateLastMsg(aiMsg);
  }catch(e){
    aiMsg.content='❌ 错误：'+e.message;
    showToast(e.message,'error');
  }

  state.streaming=false;
  updateSendBtn();
  renderMessages(conv.messages);
  saveState();
}

function updateLastMsg(msg){
  const msgs=document.querySelectorAll('.msg-ai');
  if(!msgs.length)return;
  const last=msgs[msgs.length-1];
  const bubble=last.querySelector('.msg-bubble');
  if(!bubble)return;
  bubble.innerHTML=renderMsgContent(msg);
}

function renderMessages(messages){
  const inner=document.getElementById('chatInner');
  const welcome=document.getElementById('welcomeScreen');
  if(!messages.length){showWelcome(true);return;}
  showWelcome(false);

  let html='';
  messages.forEach((msg,i)=>{
    if(msg.role==='user'){
      html+=`<div class="msg msg-user">
        <div class="msg-avatar">👤</div>
        <div class="msg-body">
          <div class="msg-meta">你</div>
          <div class="msg-bubble">${escapeHtml(msg.content)}</div>
        </div>
      </div>`;
    }else{
      html+=`<div class="msg msg-ai">
        <div class="msg-avatar">🤖</div>
        <div class="msg-body">
          <div class="msg-meta">${msg.model||'AI'} · ${msg.provider||''}</div>
          <div class="msg-bubble">${renderMsgContent(msg)}</div>
        </div>
      </div>`;
    }
  });

  // Keep welcome if exists
  const wHtml=welcome?welcome.outerHTML:'';
  inner.innerHTML=wHtml+html;
  scrollToBottom();
}

function renderMsgContent(msg){
  let html='';
  if(msg.thinking){
    html+=`<div class="thinking-block">
      <div class="thinking-header" onclick="this.nextElementSibling.classList.toggle('show');this.querySelector('.arrow').classList.toggle('open')">
        <span class="arrow">▶</span> 💭 思考过程
      </div>
      <div class="thinking-content">${renderMd(msg.thinking)}</div>
    </div>`;
  }
  html+=renderMd(msg.content||'');
  return html;
}

function renderMd(text){
  if(!text)return'';
  let html=text;
  // Code blocks
  html=html.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>{
    return`<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code><button class="copy-btn" onclick="copyCode(this)">复制</button></pre>`;
  });
  // Inline code
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Bold
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // Italic
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Headers
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Blockquote
  html=html.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  // Lists
  html=html.replace(/^- (.+)$/gm,'<li>$1</li>');
  html=html.replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>');
  // Links
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // Paragraphs
  html=html.replace(/\n\n/g,'</p><p>');
  html=html.replace(/\n/g,'<br>');
  html='<p>'+html+'</p>';
  return html;
}

function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function copyCode(btn){
  const code=btn.parentElement.querySelector('code');
  if(code)navigator.clipboard.writeText(code.textContent).then(()=>{btn.textContent='已复制';setTimeout(()=>btn.textContent='复制',2000);});
}

// ========== INPUT ==========
function autoResize(el){updateSendBtn();
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  updateSendBtn();
}
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}
function updateSendBtn(){
  if(inputMode!=='text')return;
  const inp=document.getElementById('userInput');
  const btn=document.getElementById('sendBtn');
  const plus=document.getElementById('plusBtn');
  if(!inp||!btn)return;
  const hasText=inp.value.trim().length>0;
  btn.disabled=!hasText||state.streaming;
  btn.style.display=hasText?'flex':'none';
  if(plus)plus.style.display=hasText?'none':'flex';
}
function scrollToBottom(){
  const c=document.getElementById('chatContainer');
  setTimeout(()=>c.scrollTop=c.scrollHeight,50);
}

// ========== INPUT MODE TOGGLE ==========
let inputMode='text'; // text | voice
function toggleInputMode(){
  const wrap=document.getElementById('inputWrap');
  const toggle=document.getElementById('inputToggle');
  const sendBtn=document.getElementById('sendBtn');
  const plusBtn=document.getElementById('plusBtn');

  if(inputMode==='text'){
    inputMode='voice';
    toggle.textContent='⌨️';
    wrap.innerHTML='<button class="voice-btn" id="voiceBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">按住 说话</button>';
    sendBtn.style.display='none';
    plusBtn.style.display='flex';
  }else{
    inputMode='text';
    toggle.textContent='🎤';
    wrap.innerHTML='<textarea id="userInput" placeholder="需要问点什么吗？" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>';
    sendBtn.style.display='none';
    plusBtn.style.display='flex';
    setTimeout(()=>document.getElementById('userInput')?.focus(),50);
  }
}

// ========== VOICE RECORDING ==========
let mediaRecorder=null;
let audioChunks=[];
let voiceTimer=null;
let voiceSeconds=0;

async function startVoice(){
  const btn=document.getElementById('voiceBtn');
  if(!btn)return;
  btn.classList.add('recording');
  btn.textContent='松开 发送';

  document.getElementById('voiceOverlay').classList.add('show');
  voiceSeconds=0;
  document.getElementById('voText').textContent='正在录音... 0s';
  voiceTimer=setInterval(()=>{
    voiceSeconds++;
    document.getElementById('voText').textContent='正在录音... '+voiceSeconds+'s';
  },1000);

  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);
    audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      if(audioChunks.length>0&&voiceSeconds>=1){
        const blob=new Blob(audioChunks,{type:'audio/webm'});
        await sendVoiceMessage(blob);
      }
    };
    mediaRecorder.start();
  }catch(e){
    console.log('Mic access denied, using text fallback');
    stopVoice();
    showToast('麦克风权限被拒绝，请用文字输入','error');
  }
}

function stopVoice(){
  const btn=document.getElementById('voiceBtn');
  if(btn)btn.classList.remove('recording');
  document.getElementById('voiceOverlay').classList.remove('show');
  clearInterval(voiceTimer);
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();
  }
}

function cancelVoice(){
  document.getElementById('voiceOverlay').classList.remove('show');
  clearInterval(voiceTimer);
  audioChunks=[];
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();
  }
  const btn=document.getElementById('voiceBtn');
  if(btn){btn.classList.remove('recording');btn.textContent='按住 说话';}
}

async function sendVoiceMessage(blob){
  // For now, show as text message since we can't do speech-to-text without backend
  // In production, send blob to backend for STT
  if(!state.currentConv) newConversation();
  const conv=getConv();
  if(!conv)return;
  showWelcome(false);

  const m=state.models.find(x=>x.id===state.selectedModel)||state.models[0];
  conv.messages.push({role:'user',content:'[语音消息 '+voiceSeconds+'秒]',timestamp:Date.now()});
  if(conv.messages.length===1)conv.title='语音对话';
  renderMessages(conv.messages);

  // Send to AI with context
  callAI(conv,'用户发送了一条语音消息（'+voiceSeconds+'秒）。请回复。');
  saveState();
}

function handleFile(input){
  if(!input.files.length)return;
  const file=input.files[0];
  if(!state.currentConv) newConversation();
  const conv=getConv();
  if(!conv)return;
  showWelcome(false);

  conv.messages.push({role:'user',content:'[文件] '+file.name+' ('+(file.size/1024).toFixed(1)+'KB)',timestamp:Date.now()});
  renderMessages(conv.messages);

  // If it's an image, try to send to vision-capable models
  if(file.type.startsWith('image/')){
    const reader=new FileReader();
    reader.onload=()=>{
      callAI(conv,'用户发送了一张图片：'+file.name+'。请描述或回应。');
    };
    reader.readAsDataURL(file);
  }else{
    callAI(conv,'用户发送了一个文件：'+file.name+'。请确认收到。');
  }
  saveState();
  input.value='';
}

      </div>
      <div class="mi-actions">
        <button onclick="editModel(${i})" title="编辑">✏️</button>
        <button class="del" onclick="deleteModel(${i})" title="删除">🗑️</button>

  <div class="add-model-form" id="addModelForm">
    <div class="form-row-inline">
      <div class="form-row"><label>模型名称</label><input id="newName" placeholder="My Model"></div>

    </div>

    </div>
    <div class="form-row"><label>Base URL</label><input id="newBaseUrl" placeholder="https://api.openai.com/v1"></div>
    <div class="form-row"><label>路径</label><input id="newPath" placeholder="/chat/completions" value="/chat/completions"></div>
    <div class="form-row"><label>模型 ID</label><input id="newModelId" placeholder="gpt-4o"></div>
    <div class="form-row"><label>API Key</label>
      <div class="pw-wrap">
        <input type="password" id="newApiKey" placeholder="sk-...">
        <button class="pw-toggle" onclick="togglePw('newApiKey',this)">👁</button>
      </div>
    </div>
    <div class="form-row"><label>颜色（HEX）</label><input id="newColor" placeholder="#10a37f" value="#999"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="addModel()">添加模型</button>
  </div>`;

  // Account section
  html+=`<div class="section-title">👤 账户信息</div>
  <div style="padding:12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">
    <div style="font-size:14px;font-weight:600">${state.currentUser?.name||'管理员'} ${state.currentUser?.role==='admin'?'<span class="admin-badge">管理员</span>':''}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:4px">身份：${state.currentUser?.tag||'未设置'}</div>
  </div>`;

  body.innerHTML=html;
  document.getElementById('settingsModal').classList.add('show');
}

function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function saveAndClose(){saveState();closeSettings();showToast('设置已保存','success');}

function addModel(){
  const name=document.getElementById('newName').value.trim();
  const provider=document.getElementById('newProvider').value.trim();
  const format=document.getElementById('newFormat').value;
  const baseUrl=document.getElementById('newBaseUrl').value.trim();
  const path=document.getElementById('newPath').value.trim();
  const modelId=document.getElementById('newModelId').value.trim();
  const apiKey=document.getElementById('newApiKey').value.trim();
  const color=document.getElementById('newColor').value.trim();

  if(!name||!baseUrl||!modelId){showToast('请填写名称、Base URL 和模型 ID','error');return;}

  state.models.push({id:modelId,name,provider:provider||'自定义',format,baseUrl,path:path||'/chat/completions',modelId,apiKey,color:color||'#999'});
  saveState();
  openSettings();
  renderModelDD();
  showToast('模型已添加','success');
}

function deleteModel(i){
  if(state.models.length<=1){showToast('至少保留一个模型','error');return;}
  state.models.splice(i,1);
  if(!state.models.find(m=>m.id===state.selectedModel))state.selectedModel=state.models[0]?.id;
  saveState();
  openSettings();
  renderModelDD();
  updateModelDisplay();
}

function editModel(i){
  const m=state.models[i];
  const newKey=prompt(`输入 ${m.name} 的 API Key:`,m.apiKey||'');
  if(newKey!==null){
    m.apiKey=newKey;
    saveState();
    openSettings();
    showToast('API Key 已更新','success');
  }
}

// ========== TOAST ==========
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show '+type;
  setTimeout(()=>t.className='toast',3000);
}
