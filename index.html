<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hub - 多模型智能对话平台</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#0a0a0a;--bg-secondary:#141414;--bg-tertiary:#1a1a1a;--bg-hover:#222;
  --border:#2a2a2a;--border-light:#333;
  --text-primary:#e8e8e8;--text-secondary:#999;--text-muted:#666;
  --accent:#3b82f6;--accent-hover:#2563eb;--accent-dim:rgba(59,130,246,0.15);
  --green:#22c55e;--red:#ef4444;--orange:#f59e0b;--purple:#a855f7;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --transition:all 0.2s ease;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary)}
a{color:var(--accent);text-decoration:none}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:280px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-header .logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.sidebar-header h1{font-size:16px;font-weight:600}
.sidebar-actions{padding:12px;display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;font-size:13px;transition:var(--transition);display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--bg-hover);border-color:var(--border-light)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-icon{padding:8px;min-width:36px;justify-content:center}
.btn svg{width:16px;height:16px;fill:currentColor}

/* Conversation list */
.conv-list{flex:1;overflow-y:auto;padding:8px}
.conv-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:10px;transition:var(--transition)}
.conv-item:hover{background:var(--bg-hover)}
.conv-item.active{background:var(--accent-dim);border:1px solid rgba(59,130,246,0.3)}
.conv-item .conv-icon{width:20px;height:20px;border-radius:4px;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.conv-item .conv-info{flex:1;min-width:0}
.conv-item .conv-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item .conv-time{font-size:11px;color:var(--text-muted);margin-top:2px}
.conv-item .conv-delete{opacity:0;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:4px;transition:var(--transition)}
.conv-item:hover .conv-delete{opacity:1}
.conv-item .conv-delete:hover{color:var(--red);background:rgba(239,68,68,0.1)}

/* Sidebar footer */
.sidebar-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.sidebar-footer .btn{flex:1;justify-content:center;font-size:12px}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;background:var(--bg-primary);min-width:0}

/* Top bar */
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;background:var(--bg-secondary)}
.model-selector{flex:1;position:relative}
.model-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);cursor:pointer;transition:var(--transition);max-width:320px}
.model-btn:hover{border-color:var(--border-light)}
.model-btn .provider-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.model-btn .model-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.model-btn .model-arrow{color:var(--text-muted);font-size:10px;margin-left:auto}

/* Model dropdown */
.model-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;max-width:420px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:100;display:none;max-height:480px;flex-direction:column}
.model-dropdown.show{display:flex}
.model-search{padding:10px;border-bottom:1px solid var(--border)}
.model-search input{width:100%;padding:8px 12px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:13px;outline:none}
.model-search input:focus{border-color:var(--accent)}
.model-list{overflow-y:auto;flex:1;padding:6px}
.model-group{margin-bottom:4px}
.model-group-header{padding:6px 10px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px;cursor:pointer;border-radius:var(--radius-xs);transition:var(--transition)}
.model-group-header:hover{background:var(--bg-hover)}
.model-group-header .arrow{transition:transform 0.2s;font-size:10px}
.model-group-header .arrow.open{transform:rotate(90deg)}
.model-group-header .provider-dot{width:6px;height:6px;border-radius:50%}
.model-group-items{padding-left:8px}
.model-item{padding:8px 10px;border-radius:var(--radius-xs);cursor:pointer;display:flex;align-items:center;gap:8px;transition:var(--transition);font-size:13px}
.model-item:hover{background:var(--bg-hover)}
.model-item.selected{background:var(--accent-dim);color:var(--accent)}
.model-item .model-tags{display:flex;gap:4px;margin-left:auto}
.model-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg-tertiary);color:var(--text-muted);border:1px solid var(--border)}

/* Mode tabs */
.mode-tabs{display:flex;gap:4px;margin-left:12px}
.mode-tab{padding:5px 12px;border-radius:var(--radius-xs);font-size:12px;cursor:pointer;transition:var(--transition);color:var(--text-secondary);border:1px solid transparent}
.mode-tab:hover{background:var(--bg-hover);color:var(--text-primary)}
.mode-tab.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(59,130,246,0.3)}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:0}
.messages{max-width:800px;margin:0 auto;padding:20px 20px 100px}
.msg{margin-bottom:20px;display:flex;gap:12px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-user .msg-avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.msg-ai .msg-avatar{background:linear-gradient(135deg,var(--accent),#06b6d4)}
.msg-content{flex:1;min-width:0}
.msg-name{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text-secondary)}
.msg-text{font-size:14px;line-height:1.7;word-break:break-word}
.msg-text p{margin-bottom:8px}
.msg-text p:last-child{margin-bottom:0}
.msg-text pre{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin:10px 0;overflow-x:auto;position:relative}
.msg-text code{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px}
.msg-text :not(pre)>code{background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;font-size:13px}
.msg-text blockquote{border-left:3px solid var(--accent);padding:8px 12px;margin:10px 0;background:var(--accent-dim);border-radius:0 var(--radius-xs) var(--radius-xs) 0}
.msg-text table{border-collapse:collapse;width:100%;margin:10px 0}
.msg-text th,.msg-text td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:13px}
.msg-text th{background:var(--bg-tertiary);font-weight:600}
.msg-text img{max-width:100%;border-radius:var(--radius-sm);margin:8px 0}
.msg-text ul,.msg-text ol{padding-left:20px;margin:8px 0}
.msg-text li{margin-bottom:4px}
.msg-text h1,.msg-text h2,.msg-text h3{margin:16px 0 8px;font-weight:600}
.msg-text h1{font-size:20px}
.msg-text h2{font-size:17px}
.msg-text h3{font-size:15px}

/* Thinking block */
.thinking-block{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);margin:8px 0;overflow:hidden}
.thinking-header{padding:8px 12px;font-size:12px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.thinking-header:hover{background:var(--bg-hover)}
.thinking-header .arrow{transition:transform 0.2s;font-size:10px}
.thinking-header .arrow.open{transform:rotate(90deg)}
.thinking-content{padding:0 12px 12px;font-size:13px;color:var(--text-secondary);line-height:1.6;display:none}
.thinking-content.show{display:block}

/* Copy button */
.copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-muted);font-size:11px;cursor:pointer;opacity:0;transition:var(--transition)}
pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--bg-hover);color:var(--text-primary)}

/* Multi-model results */
.multi-results{display:grid;gap:16px;margin-top:12px}
.multi-result{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.multi-result-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.multi-result-body{padding:14px;font-size:14px;line-height:1.7}

/* Debate */
.debate-turn{margin:16px 0;padding:12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);border-left:3px solid var(--accent)}
.debate-turn .debate-model{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px}

/* Input area */
.input-area{border-top:1px solid var(--border);padding:16px 20px;background:var(--bg-secondary);flex-shrink:0}
.input-wrapper{max-width:800px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.input-box{flex:1;position:relative}
.input-box textarea{width:100%;padding:12px 16px;padding-right:40px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:14px;line-height:1.5;resize:none;outline:none;font-family:inherit;min-height:44px;max-height:200px;transition:border-color 0.2s}
.input-box textarea:focus{border-color:var(--accent)}
.input-box textarea::placeholder{color:var(--text-muted)}
.send-btn{position:absolute;right:8px;bottom:8px;width:32px;height:32px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.send-btn:hover{background:var(--accent-hover)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.send-btn svg{width:18px;height:18px}

/* Settings panel */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none;backdrop-filter:blur(4px)}
.settings-overlay.show{display:flex;align-items:center;justify-content:center}
.settings-panel{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);width:90%;max-width:640px;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.settings-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.settings-header h2{font-size:16px;font-weight:600}
.settings-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.settings-close:hover{background:var(--bg-hover);color:var(--text-primary)}
.settings-body{flex:1;overflow-y:auto;padding:20px}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}

/* Provider cards */
.provider-card{background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:var(--transition)}
.provider-card:hover{border-color:var(--border-light)}
.provider-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.provider-card-header .dot{width:10px;height:10px;border-radius:50%}
.provider-card-header .name{font-size:14px;font-weight:600}
.provider-card-header .status{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:10px}
.provider-card-header .status.ok{background:rgba(34,197,94,0.15);color:var(--green)}
.provider-card-header .status.none{background:var(--bg-hover);color:var(--text-muted)}
.provider-card input[type="password"],.provider-card input[type="text"]{width:100%;padding:8px 12px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;outline:none;font-family:monospace}
.provider-card input:focus{border-color:var(--accent)}
.provider-card .input-row{display:flex;gap:8px;align-items:center}
.provider-card .input-row input{flex:1}
.provider-card .verify-btn{padding:8px 12px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-secondary);font-size:12px;cursor:pointer;white-space:nowrap;transition:var(--transition)}
.provider-card .verify-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.provider-card .verify-btn.loading{opacity:0.5;pointer-events:none}
.endpoint-input{margin-top:8px}
.endpoint-input label{font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px}
.endpoint-input input{width:100%;padding:6px 10px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:12px;outline:none;font-family:monospace}

/* Settings footer */
.settings-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* Debate config */
.debate-config{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 0;max-width:800px;margin-left:auto;margin-right:auto}
.debate-config label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:8px}
.debate-config .slider-row{display:flex;align-items:center;gap:12px}
.debate-config input[type="range"]{flex:1;accent-color:var(--accent)}
.debate-config .slider-val{font-size:14px;font-weight:600;color:var(--accent);min-width:30px;text-align:center}
.debate-config .preset-btns{display:flex;gap:6px;margin-top:8px}
.debate-config .preset-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-muted);font-size:12px;cursor:pointer;transition:var(--transition)}
.debate-config .preset-btn:hover,.debate-config .preset-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(59,130,246,0.3)}

/* Loading dots */
.typing{display:flex;gap:4px;padding:8px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);gap:16px}
.empty-state .logo-big{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:700}
.empty-state h2{font-size:20px;color:var(--text-primary)}
.empty-state p{font-size:14px;text-align:center;max-width:400px;line-height:1.6}
.empty-state .quick-start{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.empty-state .quick-btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-secondary);font-size:13px;cursor:pointer;transition:var(--transition)}
.empty-state .quick-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Status bar */
.status-bar{padding:4px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:12px;background:var(--bg-secondary)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.status-dot.error{background:var(--red)}
.status-dot.warning{background:var(--orange)}

/* Responsive */
@media(max-width:768px){
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:150;transition:left 0.3s}
  .sidebar.open{left:0}
  .sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:140;display:none}
  .sidebar-backdrop.show{display:block}
  .mobile-menu{display:flex!important}
  .mode-tabs{display:none}
  .model-btn{max-width:180px}
}
.mobile-menu{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg-tertiary);cursor:pointer}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}

/* Multi-select models for debate */
.selected-models{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.selected-model-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:var(--accent-dim);border:1px solid rgba(59,130,246,0.3);font-size:12px;color:var(--accent)}
.selected-model-chip .remove{cursor:pointer;opacity:0.6;font-size:14px;line-height:1}
.selected-model-chip .remove:hover{opacity:1}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius-sm);background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);font-size:13px;z-index:300;box-shadow:var(--shadow);opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.success{border-color:var(--green);color:var(--green)}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">H</div>
      <h1>AI Hub</h1>
    </div>
    <div class="sidebar-actions">
      <button class="btn btn-primary" style="flex:1" onclick="newConversation()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        新对话
      </button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer">
      <button class="btn" onclick="openSettings()">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
        设置
      </button>
      <button class="btn" onclick="exportData()">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        导出
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Top bar -->
    <div class="topbar">
      <button class="mobile-menu" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="model-selector">
        <div class="model-btn" id="modelBtn" onclick="toggleModelDropdown()">
          <span class="provider-dot" id="providerDot" style="background:var(--accent)"></span>
          <span class="model-name" id="modelName">选择模型</span>
          <span class="model-arrow">▼</span>
        </div>
        <div class="model-dropdown" id="modelDropdown">
          <div class="model-search">
            <input type="text" placeholder="搜索模型..." id="modelSearchInput" oninput="filterModels(this.value)">

          <div class="model-list" id="modelList"></div>
        </div>
      </div>
      <div class="mode-tabs">
        <div class="mode-tab active" data-mode="single" onclick="setMode('single')">💬 单模型</div>
        <div class="mode-tab" data-mode="multi" onclick="setMode('multi')">📋 多模型</div>
        <div class="mode-tab" data-mode="debate" onclick="setMode('debate')">⚔️ 辩论</div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="logo-big">H</div>
          <h2>AI Hub</h2>
          <p>集合 15+ 家 AI 厂商，输入 API Key 即可对话。支持单模型、多模型对比、模型辩论。</p>
          <div class="quick-start">
            <button class="quick-btn" onclick="openSettings()">🔑 配置 API Key</button>
            <button class="quick-btn" onclick="quickStart()">💡 快速开始</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div id="debateConfig" class="debate-config" style="display:none">
        <label>辩论轮数：<span id="debateRoundsVal">3</span> 轮</label>
        <div class="slider-row">
          <input type="range" min="1" max="20" value="3" id="debateRounds" oninput="document.getElementById('debateRoundsVal').textContent=this.value">
        </div>
        <div class="preset-btns">
          <span class="preset-btn active" onclick="setDebateRounds(3)">3轮</span>
          <span class="preset-btn" onclick="setDebateRounds(5)">5轮</span>
          <span class="preset-btn" onclick="setDebateRounds(10)">10轮</span>
          <span class="preset-btn" onclick="setDebateRounds(20)">20轮</span>
        </div>
        <div id="selectedModelsArea" style="margin-top:12px">
          <label style="font-size:12px;color:var(--text-muted)">选择辩论模型（点击模型选择器添加）：</label>
          <div class="selected-models" id="selectedModels"></div>
        </div>
      </div>
      <div class="input-wrapper">
        <div class="input-box">
          <textarea id="userInput" placeholder="输入消息..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">就绪</span>
      <span style="margin-left:auto" id="tokenCount"></span>
    </div>
  </main>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <div class="settings-header">
      <h2>⚙️ 设置</h2>
      <button class="settings-close" onclick="closeSettings()">×</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
    <div class="settings-footer">
      <button class="btn" onclick="closeSettings()">关闭</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>

    ]
  },
  minimax: {

    endpoint: 'https://api.minimax.chat/v1/text/chatcompletion_v2',
    models: [
      { id: 'abab6.5s-chat', name: 'Abab 6.5s', tags: ['快速'] },
      { id: 'abab6.5-chat', name: 'Abab 6.5', tags: ['均衡'] },
    ]
  },
  yi: {
    name: '零一万物', color: '#06b6d4',
    endpoint: 'https://api.lingyiwanwu.com/v1/chat/completions',
    models: [
      { id: 'yi-large', name: 'Yi Large', tags: ['最强'] },
      { id: 'yi-medium', name: 'Yi Medium', tags: ['均衡'] },
      { id: 'yi-spark', name: 'Yi Spark', tags: ['快速','便宜'] },
    ]
  },
  stepfun: {

    models: [
      { id: 'step-2-16k', name: 'Step 2 16K', tags: ['最强'] },
      { id: 'step-1-flash', name: 'Step 1 Flash', tags: ['快速','免费'] },
    ]
  },
  baichuan: {
    name: '百川智能', color: '#f97316',
    endpoint: 'https://api.baichuan-ai.com/v1/chat/completions',
    models: [
      { id: 'Baichuan4', name: 'Baichuan 4', tags: ['最强'] },
      { id: 'Baichuan3-Turbo', name: 'Baichuan 3 Turbo', tags: ['快速'] },
    ]
  },
  hunyuan: {
    name: '腾讯混元', color: '#0ea5e9',
    endpoint: 'https://api.hunyuan.cloud.tencent.com/v1/chat/completions',
    models: [
      { id: 'hunyuan-pro', name: 'Hunyuan Pro', tags: ['最强'] },
      { id: 'hunyuan-standard', name: 'Hunyuan Standard', tags: ['均衡'] },
    ]
  },
  xiaomi: {
    name: '小米 MiMo', color: '#ff6900',
    endpoint: 'https://api-oc.xiaomimimo.com/v1/chat/completions',
    models: [
      { id: 'mimo-v2.5-pro', name: 'MiMo V2.5 Pro', tags: ['思考','推理'] },
    ]
  },
  custom: {
    name: '自定义', color: '#999',
    endpoint: '',
    models: []
  }
};

const PROVIDER_COLORS = {};
Object.entries(PROVIDERS).forEach(([k,v]) => PROVIDER_COLORS[k] = v.color);

// ========== STATE ==========
let state = {
  currentConv: null,
  conversations: [],
  mode: 'single', // single | multi | debate
  selectedModel: null, // {provider, modelId}
  debateModels: [], // [{provider, modelId}]
  debateRounds: 3,
  expandedGroups: {},
  settings: { providers: {} }, // { openai: { apiKey, endpoint }, ... }
  streaming: false,
};

// ========== INIT ==========
function init() {
  loadState();
  renderModelList();
  renderConvList();
  if (state.conversations.length === 0) {
    showEmptyState(true);
  } else {
    const last = state.conversations[0];
    switchConversation(last.id);
  }
  updateModelBtn();
  updateSendBtn();

  // Mark all groups expanded by default
  Object.keys(PROVIDERS).forEach(k => {
    if (state.expandedGroups[k] === undefined) state.expandedGroups[k] = true;
  });

  document.addEventListener('click', (e) => {
    const dd = document.getElementById('modelDropdown');
    const btn = document.getElementById('modelBtn');
    if (!dd.contains(e.target) && !btn.contains(e.target)) {
      dd.classList.remove('show');
    }
  });
}

// ========== STORAGE ==========
function loadState() {
  try {
    const saved = localStorage.getItem('ai-hub-state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem('ai-hub-state', JSON.stringify({
      conversations: state.conversations,
      selectedModel: state.selectedModel,
      debateModels: state.debateModels,
      debateRounds: state.debateRounds,
      settings: state.settings,
      expandedGroups: state.expandedGroups,
      mode: state.mode,
    }));
  } catch(e) {}
}

// ========== CONVERSATIONS ==========
function newConversation() {
  const conv = {
    id: Date.now().toString(),
    title: '新对话',
    messages: [],
    mode: state.mode,
    createdAt: new Date().toISOString(),
  };
  state.conversations.unshift(conv);
  switchConversation(conv.id);
  saveState();
  renderConvList();
  showEmptyState(true);
}

function switchConversation(id) {
  state.currentConv = id;
  const conv = state.conversations.find(c => c.id === id);
  if (!conv) return;
  state.mode = conv.mode || 'single';
  updateModeTabs();
  renderMessages(conv.messages);
  renderConvList();
  document.getElementById('emptyState')?.remove();
  updateDebateConfig();
}

function deleteConversation(id, e) {
  e.stopPropagation();
  state.conversations = state.conversations.filter(c => c.id !== id);
  if (state.currentConv === id) {
    if (state.conversations.length > 0) {
      switchConversation(state.conversations[0].id);
    } else {
      state.currentConv = null;
      showEmptyState(true);
    }
  }
  saveState();
  renderConvList();
}

function getCurrentConv() {
  return state.conversations.find(c => c.id === state.currentConv);
}

function renderConvList() {
  const list = document.getElementById('convList');
  list.innerHTML = state.conversations.map(c => `
    <div class="conv-item ${c.id === state.currentConv ? 'active' : ''}" onclick="switchConversation('${c.id}')">
      <div class="conv-icon">💬</div>
      <div class="conv-info">
        <div class="conv-title">${escapeHtml(c.title)}</div>
        <div class="conv-time">${formatTime(c.createdAt)}</div>
      </div>
      <div class="conv-delete" onclick="deleteConversation('${c.id}', event)">×</div>
    </div>
  `).join('');
}

// ========== MODE ==========
function setMode(mode) {
  state.mode = mode;
  const conv = getCurrentConv();
  if (conv) conv.mode = mode;
  updateModeTabs();
  updateDebateConfig();
  updateModelBtn();
  saveState();
}

function updateModeTabs() {
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === state.mode);
  });
}

function updateDebateConfig() {
  const dc = document.getElementById('debateConfig');
  dc.style.display = state.mode === 'debate' ? 'block' : 'none';
  if (state.mode === 'debate') {
    document.getElementById('debateRounds').value = state.debateRounds;
    document.getElementById('debateRoundsVal').textContent = state.debateRounds;
    renderSelectedModels();
  }
}

function setDebateRounds(n) {
  state.debateRounds = n;
  document.getElementById('debateRounds').value = n;
  document.getElementById('debateRoundsVal').textContent = n;
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === n + '轮');
  });
  saveState();
}

function renderSelectedModels() {
  const area = document.getElementById('selectedModels');
  area.innerHTML = state.debateModels.map((m, i) => {
    const p = PROVIDERS[m.provider];
    const model = p?.models.find(md => md.id === m.modelId);
    return `<span class="selected-model-chip">
      <span style="width:6px;height:6px;border-radius:50%;background:${p?.color || '#999'}"></span>
      ${model?.name || m.modelId}
      <span class="remove" onclick="removeDebateModel(${i})">×</span>
    </span>`;
  }).join('');
}

function removeDebateModel(i) {
  state.debateModels.splice(i, 1);
  renderSelectedModels();
  saveState();
}

// ========== MODEL SELECTOR ==========
function toggleModelDropdown() {
  const dd = document.getElementById('modelDropdown');
  dd.classList.toggle('show');
  if (dd.classList.contains('show')) {
    document.getElementById('modelSearchInput').value = '';
    filterModels('');
    setTimeout(() => document.getElementById('modelSearchInput').focus(), 50);
  }
}

function renderModelList() {
  const list = document.getElementById('modelList');
  let html = '';
  for (const [key, provider] of Object.entries(PROVIDERS)) {
    if (key === 'custom') continue;
    const hasKey = !!state.settings.providers?.[key]?.apiKey;
    const expanded = state.expandedGroups[key] !== false;
    html += `<div class="model-group" data-provider="${key}">
      <div class="model-group-header" onclick="toggleGroup('${key}')">
        <span class="arrow ${expanded ? 'open' : ''}">▶</span>
        <span class="provider-dot" style="background:${provider.color}"></span>
        ${provider.name}
        ${hasKey ? '<span style="font-size:10px;color:var(--green);margin-left:4px">●</span>' : ''}
      </div>
      <div class="model-group-items" style="display:${expanded ? 'block' : 'none'}">
        ${provider.models.map(m => `
          <div class="model-item" data-search="${(provider.name + ' ' + m.name + ' ' + m.tags.join(' ')).toLowerCase()}"
               onclick="selectModel('${key}','${m.id}')">
            <span style="width:6px;height:6px;border-radius:50%;background:${provider.color};flex-shrink:0"></span>
            ${m.name}
            <span class="model-tags">${m.tags.map(t => `<span class="model-tag">${t}</span>`).join('')}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
  }
  // Custom provider
  html += `<div class="model-group" data-provider="custom">
    <div class="model-group-header" onclick="toggleGroup('custom')">
      <span class="arrow ${state.expandedGroups.custom ? 'open' : ''}">▶</span>
      <span class="provider-dot" style="background:#999"></span>
      自定义模型
    </div>
    <div class="model-group-items" style="display:${state.expandedGroups.custom !== false ? 'block' : 'none'}">
      <div style="padding:8px 10px;font-size:12px;color:var(--text-muted)">在设置中添加自定义 Endpoint 和模型</div>
    </div>
  </div>`;
  list.innerHTML = html;
}

function toggleGroup(key) {
  state.expandedGroups[key] = state.expandedGroups[key] === false ? true : false;
  renderModelList();
  saveState();
}

function selectModel(provider, modelId) {
  state.selectedModel = { provider, modelId };
  updateModelBtn();
  document.getElementById('modelDropdown').classList.remove('show');

  // In debate mode, add to debate models
  if (state.mode === 'debate') {
    const exists = state.debateModels.find(m => m.provider === provider && m.modelId === modelId);
    if (!exists) {
      state.debateModels.push({ provider, modelId });
      renderSelectedModels();
    }
  }

  saveState();
}

function filterModels(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.model-item').forEach(item => {
    const search = item.dataset.search || '';
    item.style.display = search.includes(q) ? '' : 'none';
  });
  // Show all groups when searching
  if (q) {
    document.querySelectorAll('.model-group-items').forEach(g => g.style.display = 'block');
    document.querySelectorAll('.model-group-header .arrow').forEach(a => a.classList.add('open'));
  }
}

function updateModelBtn() {
  const dot = document.getElementById('providerDot');
  const name = document.getElementById('modelName');
  if (state.selectedModel) {
    const p = PROVIDERS[state.selectedModel.provider];
    const m = p?.models.find(md => md.id === state.selectedModel.modelId);
    dot.style.background = p?.color || '#999';
    name.textContent = m?.name || state.selectedModel.modelId;
  } else {
    dot.style.background = 'var(--accent)';
    name.textContent = '选择模型';
  }
}

// ========== SETTINGS ==========
function openSettings() {
  const body = document.getElementById('settingsBody');
  let html = '<div class="settings-section"><h3>API Key 配置</h3>';

  for (const [key, provider] of Object.entries(PROVIDERS)) {
    if (key === 'custom') continue;
    const cfg = state.settings.providers?.[key] || {};
    const hasKey = !!cfg.apiKey;
    html += `<div class="provider-card" id="card-${key}">
      <div class="provider-card-header">
        <span class="dot" style="background:${provider.color}"></span>
        <span class="name">${provider.name}</span>
        <span class="status ${hasKey ? 'ok' : 'none'}">${hasKey ? '已配置' : '未配置'}</span>
      </div>
      <div class="input-row">
        <input type="password" id="key-${key}" placeholder="输入 API Key..." value="${cfg.apiKey || ''}" onchange="updateProviderKey('${key}')">
        <button class="verify-btn" onclick="verifyKey('${key}')">验证</button>
      </div>
      <div class="endpoint-input">
        <label>API Endpoint（可选，留空使用默认）</label>
        <input type="text" id="ep-${key}" placeholder="${provider.endpoint}" value="${cfg.endpoint || ''}" onchange="updateProviderEndpoint('${key}')">
      </div>
    </div>`;
  }

  // Custom provider
  const customCfg = state.settings.providers?.custom || {};
  html += `<div class="provider-card" id="card-custom">
    <div class="provider-card-header">
      <span class="dot" style="background:#999"></span>
      <span class="name">自定义 Provider</span>
      <span class="status ${customCfg.apiKey ? 'ok' : 'none'}">${customCfg.apiKey ? '已配置' : '未配置'}</span>
    </div>
    <div class="input-row">
      <input type="password" id="key-custom" placeholder="输入 API Key..." value="${customCfg.apiKey || ''}" onchange="updateProviderKey('custom')">
    </div>
    <div class="endpoint-input">
      <label>Endpoint（必填）</label>
      <input type="text" id="ep-custom" placeholder="https://your-api.com/v1/chat/completions" value="${customCfg.endpoint || ''}" onchange="updateProviderEndpoint('custom')">
    </div>
    <div class="endpoint-input">
      <label>模型 ID（用逗号分隔多个）</label>
      <input type="text" id="models-custom" placeholder="model-a,model-b" value="${(customCfg.models || []).join(',')}" onchange="updateCustomModels()">
    </div>
  </div>`;

  html += '</div>';
  body.innerHTML = html;
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function saveSettings() {
  saveState();
  renderModelList();
  closeSettings();
  showToast('设置已保存', 'success');
}

function updateProviderKey(key) {
  if (!state.settings.providers) state.settings.providers = {};
  if (!state.settings.providers[key]) state.settings.providers[key] = {};
  state.settings.providers[key].apiKey = document.getElementById(`key-${key}`).value.trim();
  const card = document.getElementById(`card-${key}`);
  const status = card.querySelector('.status');
  if (state.settings.providers[key].apiKey) {
    status.textContent = '已配置';
    status.className = 'status ok';
  } else {
    status.textContent = '未配置';
    status.className = 'status none';
  }
  saveState();
}

function updateProviderEndpoint(key) {
  if (!state.settings.providers) state.settings.providers = {};
  if (!state.settings.providers[key]) state.settings.providers[key] = {};
  state.settings.providers[key].endpoint = document.getElementById(`ep-${key}`).value.trim();
  saveState();
}

function updateCustomModels() {
  if (!state.settings.providers) state.settings.providers = {};
  if (!state.settings.providers.custom) state.settings.providers.custom = {};
  const val = document.getElementById('models-custom').value.trim();
  state.settings.providers.custom.models = val ? val.split(',').map(s => s.trim()).filter(Boolean) : [];

  // Update PROVIDERS.custom.models
  PROVIDERS.custom.models = state.settings.providers.custom.models.map(id => ({
    id, name: id, tags: ['自定义']
  }));
  saveState();
}

async function verifyKey(key) {
  const btn = document.querySelector(`#card-${key} .verify-btn`);
  btn.textContent = '验证中...';
  btn.classList.add('loading');

  const cfg = state.settings.providers?.[key];
  const provider = PROVIDERS[key];
  if (!cfg?.apiKey) {
    btn.textContent = '✗ 无Key';
    btn.classList.remove('loading');
    setTimeout(() => { btn.textContent = '验证'; }, 2000);
    return;
  }

  const endpoint = cfg.endpoint || provider.endpoint;
  try {
    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${cfg.apiKey}`,
    };
    // Anthropic uses x-api-key
    if (key === 'anthropic') {
      headers['x-api-key'] = cfg.apiKey;
      headers['anthropic-version'] = '2023-06-01';
      delete headers['Authorization'];
    }

    const testModel = provider.models[0]?.id || 'gpt-4o-mini';
    const body = {
      model: testModel,
      messages: [{ role: 'user', content: 'hi' }],
      max_tokens: 5,
    };
    if (key === 'anthropic') {
      body.max_tokens = 5;
    }

    const resp = await fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });

    if (resp.ok || resp.status === 200) {
      btn.textContent = '✓ 通过';
      btn.style.color = 'var(--green)';
    } else {
      const err = await resp.text();
      btn.textContent = `✗ ${resp.status}`;
      btn.style.color = 'var(--red)';
      console.error('Verify error:', err);
    }
  } catch (e) {
    btn.textContent = '✗ 失败';
    btn.style.color = 'var(--red)';
  }
  btn.classList.remove('loading');
  setTimeout(() => { btn.textContent = '验证'; btn.style.color = ''; }, 3000);
}

// ========== MESSAGES ==========
function showEmptyState(show) {
  const area = document.getElementById('messages');
  if (show && !document.getElementById('emptyState')) {
    area.innerHTML = `<div class="empty-state" id="emptyState">
      <div class="logo-big">H</div>
      <h2>AI Hub</h2>
      <p>集合 15+ 家 AI 厂商，输入 API Key 即可对话。支持单模型、多模型对比、模型辩论。</p>
      <div class="quick-start">
        <button class="quick-btn" onclick="openSettings()">🔑 配置 API Key</button>
        <button class="quick-btn" onclick="quickStart()">💡 快速开始</button>
      </div>
    </div>`;
  } else if (!show) {
    document.getElementById('emptyState')?.remove();
  }
}

function quickStart() {
  openSettings();
}

function renderMessages(messages) {
  const area = document.getElementById('messages');
  if (!messages || messages.length === 0) {
    showEmptyState(true);
    return;
  }
  showEmptyState(false);
  area.innerHTML = messages.map((msg, i) => renderMessage(msg, i)).join('');
  scrollToBottom();
}

function renderMessage(msg, index) {
  if (msg.role === 'user') {
    return `<div class="msg msg-user">
      <div class="msg-avatar">👤</div>
      <div class="msg-content">
        <div class="msg-name">你</div>
        <div class="msg-text">${escapeHtml(msg.content)}</div>
      </div>
    </div>`;
  }

  // AI message
  let content = '';
  if (msg.mode === 'multi' && msg.results) {
    content = '<div class="multi-results">';
    msg.results.forEach(r => {
      const p = PROVIDERS[r.provider];
      content += `<div class="multi-result">
        <div class="multi-result-header">
          <span style="width:8px;height:8px;border-radius:50%;background:${p?.color || '#999'}"></span>
          ${r.modelName || r.model}
          <span style="margin-left:auto;font-size:11px;color:var(--text-muted)">${r.provider}</span>
        </div>
        <div class="multi-result-body">${renderMarkdown(r.content || r.error || '无响应')}</div>
      </div>`;
    });
    content += '</div>';
  } else if (msg.mode === 'debate' && msg.turns) {
    content = msg.turns.map(turn => `
      <div class="debate-turn" style="border-left-color:${PROVIDERS[turn.provider]?.color || 'var(--accent)'}">
        <div class="debate-model">${turn.modelName || turn.model}（第${turn.round}轮）</div>
        <div class="msg-text">${renderMarkdown(turn.content)}</div>
      </div>
    `).join('');
    if (msg.summary) {
      content += `<div class="debate-turn" style="border-left-color:var(--green)">
        <div class="debate-model">📋 辩论总结</div>
        <div class="msg-text">${renderMarkdown(msg.summary)}</div>
      </div>`;
    }
  } else {
    // Single model or streaming
    let thinkingHtml = '';
    if (msg.thinking) {
      thinkingHtml = `<div class="thinking-block">
        <div class="thinking-header" onclick="this.nextElementSibling.classList.toggle('show');this.querySelector('.arrow').classList.toggle('open')">
          <span class="arrow">▶</span> 💭 思考过程
        </div>
        <div class="thinking-content">${renderMarkdown(msg.thinking)}</div>
      </div>`;
    }
    content = thinkingHtml + renderMarkdown(msg.content || '');
  }

  const p = msg.provider ? PROVIDERS[msg.provider] : null;
  return `<div class="msg msg-ai">
    <div class="msg-avatar">🤖</div>
    <div class="msg-content">
      <div class="msg-name">${msg.modelName || 'AI'} ${p ? `<span style="color:${p.color};font-size:11px">${p.name}</span>` : ''}</div>
      <div class="msg-text">${content}</div>
    </div>
  </div>`;
}

// ========== SEND MESSAGE ==========
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || state.streaming) return;

  // Ensure conversation exists
  if (!state.currentConv) {
    newConversation();
  }
  const conv = getCurrentConv();
  if (!conv) return;

  // Remove empty state
  showEmptyState(false);

  // Add user message
  conv.messages.push({ role: 'user', content: text });
  if (conv.messages.length === 1) {
    conv.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
    renderConvList();
  }

  renderMessages(conv.messages);
  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();

  if (state.mode === 'single') {
    await sendSingleMessage(conv, text);
  } else if (state.mode === 'multi') {
    await sendMultiMessage(conv, text);
  } else if (state.mode === 'debate') {
    await sendDebateMessage(conv, text);
  }

  saveState();
}

async function sendSingleMessage(conv, text) {
  if (!state.selectedModel) {
    showToast('请先选择模型', 'error');
    return;
  }

  const { provider, modelId } = state.selectedModel;
  const cfg = state.settings.providers?.[provider];
  if (!cfg?.apiKey) {
    showToast(`请先在设置中配置 ${PROVIDERS[provider]?.name} 的 API Key`, 'error');
    openSettings();
    return;
  }

  const providerInfo = PROVIDERS[provider];
  const modelInfo = providerInfo.models.find(m => m.id === modelId);
  const endpoint = cfg.endpoint || providerInfo.endpoint;

  // Add placeholder AI message
  const aiMsg = {
    role: 'assistant',
    content: '',
    thinking: '',
    provider,
    modelName: modelInfo?.name || modelId,
    mode: 'single',
  };
  conv.messages.push(aiMsg);
  renderMessages(conv.messages);

  setStatus('streaming', '正在生成...');

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (provider === 'anthropic') {
      headers['x-api-key'] = cfg.apiKey;
      headers['anthropic-version'] = '2023-06-01';
    } else {
      headers['Authorization'] = `Bearer ${cfg.apiKey}`;
    }

    const messages = conv.messages
      .filter(m => m.role === 'user' || (m.role === 'assistant' && m.content))
      .slice(0, -1)
      .map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }));

    messages.push({ role: 'user', content: text });

    let body;
    if (provider === 'anthropic') {
      body = {
        model: modelId,
        messages,
        max_tokens: 4096,
        stream: true,
      };
    } else {
      body = {
        model: modelId,
        messages,
        stream: true,
      };
    }

    state.streaming = true;
    updateSendBtn();

    const resp = await fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`API 错误 ${resp.status}: ${err.slice(0, 200)}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullContent = '';
    let thinkingContent = '';
    let isThinking = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const json = JSON.parse(data);
          let delta = '';

          if (provider === 'anthropic') {
            if (json.type === 'content_block_delta') {
              if (json.delta?.type === 'thinking_delta') {
                thinkingContent += json.delta.thinking || '';
                isThinking = true;
              } else if (json.delta?.type === 'text_delta') {
                delta = json.delta.text || '';
                isThinking = false;
              }
            }
          } else {
            const choice = json.choices?.[0];
            if (choice?.delta) {
              // Check for reasoning content (DeepSeek R1, etc.)
              if (choice.delta.reasoning_content) {
                thinkingContent += choice.delta.reasoning_content;
                isThinking = true;
              } else if (choice.delta.content) {
                delta = choice.delta.content;
                isThinking = false;
              }
            }
          }

          if (delta) fullContent += delta;

          // Update UI
          aiMsg.content = fullContent;
          aiMsg.thinking = thinkingContent;
          updateLastMessage(aiMsg);
        } catch (e) {}
      }
    }

    setStatus('ready', '就绪');
  } catch (e) {
    aiMsg.content = `❌ 错误：${e.message}`;
    setStatus('error', '出错了');
    showToast(e.message, 'error');
  }

  state.streaming = false;
  updateSendBtn();
  renderMessages(conv.messages);
}

async function sendMultiMessage(conv, text) {
  // Get models with API keys configured
  const targets = [];
  for (const [key, provider] of Object.entries(PROVIDERS)) {
    if (key === 'custom') continue;
    const cfg = state.settings.providers?.[key];
    if (cfg?.apiKey && provider.models.length > 0) {
      // Use first model of each provider
      targets.push({ provider: key, modelId: provider.models[0].id, modelName: provider.models[0].name });
    }
  }

  if (targets.length === 0) {
    showToast('请先在设置中配置至少一个 API Key', 'error');
    openSettings();
    return;
  }

  const aiMsg = {
    role: 'assistant',
    mode: 'multi',
    results: targets.map(t => ({
      ...t,
      content: '',
      loading: true,
    })),
  };
  conv.messages.push(aiMsg);
  renderMessages(conv.messages);
  setStatus('streaming', `正在对比 ${targets.length} 个模型...`);

  // Send to all models in parallel
  const promises = targets.map(async (t, i) => {
    const cfg = state.settings.providers[t.provider];
    const providerInfo = PROVIDERS[t.provider];
    const endpoint = cfg.endpoint || providerInfo.endpoint;

    try {
      const headers = { 'Content-Type': 'application/json' };
      if (t.provider === 'anthropic') {
        headers['x-api-key'] = cfg.apiKey;
        headers['anthropic-version'] = '2023-06-01';
      } else {
        headers['Authorization'] = `Bearer ${cfg.apiKey}`;
      }

      const body = t.provider === 'anthropic'
        ? { model: t.modelId, messages: [{ role: 'user', content: text }], max_tokens: 2048 }
        : { model: t.modelId, messages: [{ role: 'user', content: text }] };

      const resp = await fetch(endpoint, {
        method: 'POST',
        headers,
        body: JSON.stringify(body),
      });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      let content = '';
      if (t.provider === 'anthropic') {
        content = data.content?.[0]?.text || '';
      } else {
        content = data.choices?.[0]?.message?.content || '';
      }

      aiMsg.results[i].content = content;
      aiMsg.results[i].loading = false;
    } catch (e) {
      aiMsg.results[i].content = '';
      aiMsg.results[i].error = `❌ ${e.message}`;
      aiMsg.results[i].loading = false;
    }
  });

  await Promise.all(promises);
  setStatus('ready', '就绪');
  state.streaming = false;
  renderMessages(conv.messages);
}

async function sendDebateMessage(conv, text) {
  if (state.debateModels.length < 2) {
    showToast('辩论模式至少需要选择 2 个模型', 'error');
    return;
  }

  const rounds = state.debateRounds;
  const aiMsg = {
    role: 'assistant',
    mode: 'debate',
    turns: [],
    summary: '',
  };
  conv.messages.push(aiMsg);
  renderMessages(conv.messages);
  setStatus('streaming', `辩论进行中（${rounds}轮）...`);

  let debateContext = text;

  for (let round = 1; round <= rounds; round++) {
    for (const dm of state.debateModels) {
      const cfg = state.settings.providers?.[dm.provider];
      if (!cfg?.apiKey) continue;

      const providerInfo = PROVIDERS[dm.provider];
      const modelInfo = providerInfo.models.find(m => m.id === dm.modelId);
      const endpoint = cfg.endpoint || providerInfo.endpoint;

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (dm.provider === 'anthropic') {
          headers['x-api-key'] = cfg.apiKey;
          headers['anthropic-version'] = '2023-06-01';
        } else {
          headers['Authorization'] = `Bearer ${cfg.apiKey}`;
        }

        const prompt = round === 1
          ? `辩论主题：${text}\n\n请发表你的观点（你是${modelInfo?.name || dm.modelId}）。`
          : `辩论主题：${text}\n\n以下是其他模型的观点：\n${debateContext}\n\n请发表你的第${round}轮回应，可以反驳或补充。`;

        const body = dm.provider === 'anthropic'
          ? { model: dm.modelId, messages: [{ role: 'user', content: prompt }], max_tokens: 2048 }
          : { model: dm.modelId, messages: [{ role: 'user', content: prompt }] };

        const resp = await fetch(endpoint, {
          method: 'POST',
          headers,
          body: JSON.stringify(body),
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        let content = '';
        if (dm.provider === 'anthropic') {
          content = data.content?.[0]?.text || '';
        } else {
          content = data.choices?.[0]?.message?.content || '';
        }

        aiMsg.turns.push({
          provider: dm.provider,
          model: dm.modelId,
          modelName: modelInfo?.name || dm.modelId,
          round,
          content,
        });

        debateContext += `\n\n【${modelInfo?.name || dm.modelId}】：${content}`;
        renderMessages(conv.messages);
        scrollToBottom();
      } catch (e) {
        aiMsg.turns.push({
          provider: dm.provider,
          model: dm.modelId,
          modelName: modelInfo?.name || dm.modelId,
          round,
          content: `❌ 错误：${e.message}`,
        });
      }
    }
  }

  // Generate summary
  try {
    const summaryProvider = state.debateModels[0];
    const cfg = state.settings.providers?.[summaryProvider.provider];
    const providerInfo = PROVIDERS[summaryProvider.provider];
    const endpoint = cfg.endpoint || providerInfo.endpoint;

    const headers = { 'Content-Type': 'application/json' };
    if (summaryProvider.provider === 'anthropic') {
      headers['x-api-key'] = cfg.apiKey;
      headers['anthropic-version'] = '2023-06-01';
    } else {
      headers['Authorization'] = `Bearer ${cfg.apiKey}`;
    }

    const summaryPrompt = `以下是${rounds}轮辩论的完整内容：\n\n${debateContext}\n\n请作为中立裁判，总结各方观点，指出共识和分歧，给出综合评价。`;

    const body = summaryProvider.provider === 'anthropic'
      ? { model: summaryProvider.modelId, messages: [{ role: 'user', content: summaryPrompt }], max_tokens: 2048 }
      : { model: summaryProvider.modelId, messages: [{ role: 'user', content: summaryPrompt }] };

    const resp = await fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });

    if (resp.ok) {
      const data = await resp.json();
      if (summaryProvider.provider === 'anthropic') {
        aiMsg.summary = data.content?.[0]?.text || '';
      } else {
        aiMsg.summary = data.choices?.[0]?.message?.content || '';
      }
    }
  } catch (e) {}

  setStatus('ready', '就绪');
  state.streaming = false;
  renderMessages(conv.messages);
}

function updateLastMessage(msg) {
  const msgs = document.querySelectorAll('.msg-ai');
  if (msgs.length === 0) return;
  const last = msgs[msgs.length - 1];
  const textEl = last.querySelector('.msg-text');
  if (!textEl) return;

  let content = '';
  if (msg.thinking) {
    content += `<div class="thinking-block">
      <div class="thinking-header" onclick="this.nextElementSibling.classList.toggle('show');this.querySelector('.arrow').classList.toggle('open')">
        <span class="arrow">▶</span> 💭 思考过程
      </div>
      <div class="thinking-content">${renderMarkdown(msg.thinking)}</div>
    </div>`;
  }
  content += renderMarkdown(msg.content || '');
  textEl.innerHTML = content;
  scrollToBottom();
}

// ========== RENDERING ==========
function renderMarkdown(text) {
  if (!text) return '';
  try {
    // Configure marked
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true,
    });

    let html = marked.parse(text);

    // KaTeX for math
    html = html.replace(/\$\$(.+?)\$\$/gs, (_, tex) => {
      try { return katex.renderToString(tex, { displayMode: true, throwOnError: false }); }
      catch(e) { return tex; }
    });
    html = html.replace(/\$(.+?)\$/g, (_, tex) => {
      try { return katex.renderToString(tex, { displayMode: false, throwOnError: false }); }
      catch(e) { return tex; }
    });

    return html;
  } catch (e) {
    return escapeHtml(text).replace(/\n/g, '<br>');
  }
}

// ========== UI HELPERS ==========
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  updateSendBtn();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  const input = document.getElementById('userInput');
  btn.disabled = !input.value.trim() || state.streaming;
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot' + (type === 'error' ? ' error' : type === 'streaming' ? ' warning' : '');
  txt.textContent = text;
}

function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebarBackdrop');
  sidebar.classList.toggle('open');
  backdrop.classList.toggle('show');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function exportData() {
  const data = JSON.stringify(state.conversations, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ai-hub-conversations.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('导出成功', 'success');
}

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('copy-btn')) {
    const code = e.target.parentElement.querySelector('code');
    if (code) {
      navigator.clipboard.writeText(code.textContent).then(() => {

      pre.style.position = 'relative';
      pre.appendChild(btn);

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Init
init();
